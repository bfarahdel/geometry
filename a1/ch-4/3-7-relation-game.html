<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Inverse Battle - Speed Edition</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Arial Black', Gadget, sans-serif; background: #1a1a2e; color: white; touch-action: none; }
        
        /* Menu */
        #menu { position: absolute; inset: 0; background: #16213e; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; text-align: center; padding: 20px; }
        h1 { font-size: 3.5rem; color: #4cc9f0; margin: 0; }
        p { font-size: 1.5rem; margin: 20px 0; }
        .selection { display: flex; gap: 20px; margin: 20px; }
        .player-box { border: 5px solid #4cc9f0; padding: 15px; border-radius: 20px; width: 180px; background: rgba(255,255,255,0.05); }
        .emoji-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 10px; }
        .emoji-btn { font-size: 2rem; background: none; border: 3px solid transparent; cursor: pointer; border-radius: 10px; color: white; }
        .emoji-btn.selected { border-color: #4cc9f0; background: rgba(76, 201, 240, 0.3); }
        
        /* Split Screen */
        #game-container { display: none; width: 100vw; height: 100vh; flex-direction: row; }
        .side { position: relative; flex: 1; overflow: hidden; border-right: 4px solid rgba(255,255,255,0.3); }
        #side-p1 { background: linear-gradient(to bottom, #1e3a8a, #1a1a2e); }
        #side-p2 { background: linear-gradient(to bottom, #831843, #1a1a2e); border-right: none; }

        /* UI Overlays */
        .header { position: absolute; top: 0; width: 100%; padding: 20px 0; text-align: center; pointer-events: none; z-index: 10; background: rgba(0,0,0,0.4); border-bottom: 2px solid rgba(255,255,255,0.2); }
        .score-val { font-size: 2.5rem; font-weight: bold; display: block; color: #fff; }
        .target-val { font-size: 2.2rem; color: #4cc9f0; font-weight: bold; display: block; margin-top: 10px; background: rgba(0,0,0,0.3); padding: 5px; }
        .player-tag { font-size: 4rem; display: block; margin-bottom: 5px; }
        
        #timer-bar { position: absolute; top: 0; left: 50%; transform: translateX(-50%); background: #ff4d6d; padding: 15px 30px; border-radius: 0 0 20px 20px; font-size: 2.5rem; font-weight: bold; z-index: 20; box-shadow: 0 5px 20px rgba(0,0,0,0.5); }

        /* Bubbles */
        .bubble { position: absolute; width: 110px; height: 110px; background: rgba(255,255,255,0.1); border: 4px solid white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; color: white; font-size: 1.3rem; box-shadow: 0 6px 15px rgba(0,0,0,0.4); backdrop-filter: blur(5px); }
        
        /* End Screen */
        #end-screen { position: absolute; inset: 0; background: rgba(0,0,0,0.95); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 200; }
        .big-btn { padding: 25px 60px; font-size: 2rem; cursor: pointer; background: #4cc9f0; border: none; border-radius: 60px; font-weight: bold; color: #1a1a2e; text-transform: uppercase; margin-top: 40px; }
    </style>
</head>
<body>

<div id="menu">
    <h1>INVERSE BATTLE</h1>
    <p>Find the Inverse <b>(b, a)</b> of your Target!</p>
    <div class="selection">
        <div class="player-box">
            <div id="grid1" class="emoji-grid"></div>
        </div>
        <div class="player-box">
            <div id="grid2" class="emoji-grid"></div>
        </div>
    </div>
    <button class="big-btn" onclick="startGame()">Start Battle</button>
</div>

<div id="timer-bar" style="display:none">30</div>

<div id="game-container">
    <div id="side-p1" class="side" ontouchstart="handleTouch(event, 0)">
        <div class="header">
            <span id="icon1" class="player-tag"></span>
            <span id="s1" class="score-val">0</span>
            <span id="t1" class="target-val">(0, 0)</span>
        </div>
    </div>
    <div id="side-p2" class="side" ontouchstart="handleTouch(event, 1)">
        <div class="header">
            <span id="icon2" class="player-tag"></span>
            <span id="s2" class="score-val">0</span>
            <span id="t2" class="target-val">(0, 0)</span>
        </div>
    </div>
</div>

<div id="end-screen">
    <h1 id="winner-msg" style="font-size: 5rem; margin: 0;"></h1>
    <div id="final-stats" style="font-size: 3rem; margin-top: 20px;"></div>
    <button class="big-btn" onclick="location.reload()">Play Again</button>
</div>

<script>
    const emojis = ['🐶', '🐱', '🐹', '🦊', '🐻', '🐼', '🐨', '🐯', '🦁'];
    let p1Emoji = '🐶', p2Emoji = '🐯';
    let scores = [0, 0];
    let active = false;
    let time = 30;
    let bubbles = [[], []];

    // Setup Character Selection
    [1, 2].forEach(p => {
        const grid = document.getElementById(`grid${p}`);
        emojis.forEach(e => {
            const btn = document.createElement('button');
            btn.className = 'emoji-btn';
            btn.innerText = e;
            btn.onclick = () => {
                if(p === 1) p1Emoji = e; else p2Emoji = e;
                Array.from(grid.children).forEach(b => b.classList.remove('selected'));
                btn.classList.add('selected');
            };
            grid.appendChild(btn);
        });
        grid.children[p === 1 ? 0 : 7].click();
    });

    function startGame() {
        document.getElementById('menu').style.display = 'none';
        document.getElementById('game-container').style.display = 'flex';
        document.getElementById('timer-bar').style.display = 'block';
        document.getElementById('icon1').innerText = p1Emoji;
        document.getElementById('icon2').innerText = p2Emoji;
        active = true;
        spawn(0); spawn(1);
        
        let countdown = setInterval(() => {
            time--;
            document.getElementById('timer-bar').innerText = time;
            if(time <= 0) { clearInterval(countdown); end(); }
        }, 1000);
        loop();
    }

    function spawn(pIdx) {
        const x = Math.floor(Math.random() * 21) - 10;
        const y = Math.floor(Math.random() * 21) - 10;
        document.getElementById(`t${pIdx+1}`).innerText = `(${x}, ${y})`;
        
        bubbles[pIdx].forEach(b => b.remove());
        bubbles[pIdx] = [];

        createBubble(pIdx, y, x, true);
        for(let i=0; i<3; i++) {
            createBubble(pIdx, Math.floor(Math.random()*21)-10, Math.floor(Math.random()*21)-10, false);
        }
    }

    function createBubble(pIdx, x, y, isCorrect) {
        const parent = document.getElementById(`side-p${pIdx+1}`);
        const b = document.createElement('div');
        b.className = 'bubble';
        b.innerText = `(${x}, ${y})`;
        b.dataset.correct = isCorrect;
        b.style.left = (Math.random() * (parent.clientWidth - 120) + 10) + 'px';
        b.style.top = '-150px';
        // Speed increased: was 1.5 + 2.5 (avg 4). Now 2.5 + 3.5 (avg 6).
        b.speed = Math.random() * 2.5 + 3.5; 
        parent.appendChild(b);
        bubbles[pIdx].push(b);
    }

    function handleTouch(e, pIdx) {
        if(!active) return;
        const touch = e.touches[0];
        const side = document.getElementById(`side-p${pIdx+1}`);
        const sideRect = side.getBoundingClientRect();
        const tx = touch.clientX - sideRect.left;
        const ty = touch.clientY - sideRect.top;

        bubbles[pIdx].forEach((b) => {
            const bx = parseFloat(b.style.left) + 55;
            const by = parseFloat(b.style.top) + 55;
            const dist = Math.hypot(tx - bx, ty - by);

            if(dist < 60) {
                if(b.dataset.correct === 'true') {
                    scores[pIdx] += 10;
                    spawn(pIdx);
                } else {
                    scores[pIdx] -= 5;
                    b.style.top = '120%';
                }
                document.getElementById(`s${pIdx+1}`).innerText = scores[pIdx];
            }
        });
    }

    function loop() {
        if(!active) return;
        [0, 1].forEach(pIdx => {
            const h = window.innerHeight;
            bubbles[pIdx].forEach(b => {
                let top = parseFloat(b.style.top) + b.speed;
                if(top > h) {
                    top = -150;
                    b.style.left = (Math.random() * (document.getElementById(`side-p${pIdx+1}`).clientWidth - 120) + 10) + 'px';
                }
                b.style.top = top + 'px';
            });
        });
        requestAnimationFrame(loop);
    }

    function end() {
        active = false;
        document.getElementById('end-screen').style.display = 'flex';
        const msg = scores[0] > scores[1] ? `${p1Emoji} P1 WINS!` : scores[1] > scores[0] ? `${p2Emoji} P2 WINS!` : "TIE!";
        document.getElementById('winner-msg').innerText = msg;
        document.getElementById('final-stats').innerText = `SCORE: ${scores[0]} - ${scores[1]}`;
    }
</script>
</body>
</html>
