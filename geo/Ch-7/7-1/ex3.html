<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coordinate Plane Dilation</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { background-color: #0f172a; font-family: 'Inter', sans-serif; color: #f1f5f9; min-height: 100vh; display: flex; align-items: center; justify-content: center; margin: 0; padding: 20px; overflow: hidden; }
        .math-card { width: 100%; max-width: 1100px; background: #1e293b; border-radius: 24px; border: 1px solid #334155; overflow: hidden; display: flex; flex-direction: column; position: relative; height: 750px; }
        
        .grid-line { stroke: #334155; stroke-width: 1; }
        .axis-line { stroke: #94a3b8; stroke-width: 2; }
        .diag-label { font-size: 12px; font-weight: bold; fill: #38bdf8; pointer-events: none; transition: all 0.2s; }
        .label-locked { fill: #22c55e; font-size: 11px; }
        
        .guide-ray { stroke: #475569; stroke-dasharray: 4; stroke-width: 1.5; opacity: 0.3; }
        .active-ray { opacity: 1; stroke: #38bdf8; }
        .target-marker { stroke: #facc15; stroke-width: 3; stroke-linecap: round; opacity: 0.2; }
        .active-marker { opacity: 1; }

        .shape-original { stroke: #64748b; stroke-width: 2; fill: rgba(100, 116, 139, 0.1); }
        .shape-dilated { stroke: #22c55e; stroke-width: 3; fill: rgba(34, 197, 94, 0.2); transition: opacity 0.5s; }
        
        .draggable-node { cursor: grab; fill: #38bdf8; filter: drop-shadow(0 0 5px rgba(56, 189, 248, 0.5)); pointer-events: none; opacity: 0.4; }
        .active-node { pointer-events: all; opacity: 1; cursor: move; }
        .node-locked { fill: #22c55e !important; cursor: default; filter: drop-shadow(0 0 10px rgba(34, 197, 94, 0.6)); opacity: 1; }

        .math-container { width: 100%; min-height: 50px; display: flex; align-items: center; overflow: visible; }
        .math-content { font-size: 1.1rem; white-space: nowrap; padding: 4px 0; transform-origin: left center; transition: transform 0.2s ease; }
        mjx-container { margin: 0 !important; }

        .tooltip-bg { fill: #0f172a; stroke: #38bdf8; stroke-width: 1; }
        .tooltip-text { fill: #38bdf8; font-family: monospace; font-size: 12px; font-weight: bold; }
        .lang-btn.active { background-color: #075985; color: #ffffff; }
    </style>
</head>
<body>

<div class="math-card">
    <div class="bg-slate-800/80 p-6 border-b border-slate-700 flex items-center justify-between">
        <div class="flex items-center gap-4">
            <span class="bg-slate-900/50 text-sky-400 px-3 py-1 rounded-full text-[10px] font-bold border border-slate-700 uppercase tracking-widest">Example 3</span>
            <h1 class="text-xl font-bold text-white tracking-tight">Dilations in the Coordinate Plane</h1>
        </div>
        <div class="flex bg-slate-900 rounded-lg p-1 border border-slate-700">
            <button onclick="setLanguage('en')" id="enBtn" class="lang-btn active px-3 py-1 text-[10px] font-bold rounded-md">EN</button>
            <button onclick="setLanguage('zh')" id="zhBtn" class="lang-btn px-3 py-1 text-[10px] font-bold rounded-md text-slate-400">中文</button>
        </div>
    </div>

    <div class="flex flex-col md:flex-row flex-1 overflow-hidden">
        <div class="w-full md:w-2/3 p-4 bg-slate-900/30 flex flex-col items-center justify-center relative">
            <svg id="canvas" viewBox="0 0 500 500" class="w-full h-full max-w-[500px] touch-none">
                <g id="grid"></g>
                <line x1="0" y1="250" x2="500" y2="250" class="axis-line" />
                <line x1="250" y1="0" x2="250" y2="500" class="axis-line" />
                
                <line id="ray0" x1="250" y1="250" x2="100" y2="-50" class="guide-ray active-ray" /> 
                <line id="ray1" x1="250" y1="250" x2="100" y2="400" class="guide-ray" /> 
                <line id="ray2" x1="250" y1="250" x2="-50" y2="400" class="guide-ray" /> 
                <line id="ray3" x1="250" y1="250" x2="-50" y2="100" class="guide-ray" /> 

                <line id="mark0" x1="145" y1="50" x2="155" y2="50" class="target-marker active-marker" /> 
                <line id="mark1" x1="145" y1="350" x2="155" y2="350" class="target-marker" /> 
                <line id="mark2" x1="45" y1="350" x2="55" y2="350" class="target-marker" /> 
                <line id="mark3" x1="45" y1="150" x2="55" y2="150" class="target-marker" /> 
                
                <path d="M 210 170 L 210 290 L 170 290 L 170 210 Z" class="shape-original" />
                <path id="dilatedShape" d="" class="shape-dilated opacity-0" />

                <circle id="node0" cx="210" cy="170" r="7" class="draggable-node active-node" data-orig-x="-2" data-orig-y="4" data-tx="-5" data-ty="10" />
                <circle id="node1" cx="210" cy="290" r="7" class="draggable-node" data-orig-x="-2" data-orig-y="-2" data-tx="-5" data-ty="-5" />
                <circle id="node2" cx="170" cy="290" r="7" class="draggable-node" data-orig-x="-4" data-orig-y="-2" data-tx="-10" data-ty="-5" />
                <circle id="node3" cx="170" cy="210" r="7" class="draggable-node" data-orig-x="-4" data-orig-y="2" data-tx="-10" data-ty="5" />

                <text id="lab0" x="215" y="165" class="diag-label">J'</text>
                <text id="lab1" x="215" y="305" class="diag-label">K'</text>
                <text id="lab2" x="155" y="305" class="diag-label">L'</text>
                <text id="lab3" x="155" y="205" class="diag-label">M'</text>

                <g id="tooltip" class="opacity-0 pointer-events-none">
                    <rect width="64" height="24" rx="6" class="tooltip-bg" x="-32" y="-40" />
                    <text id="tipText" class="tooltip-text" x="0" y="-24" text-anchor="middle">(0, 0)</text>
                </g>
            </svg>
        </div>

        <div class="w-full md:w-1/3 p-8 border-l border-slate-700 bg-slate-800/20 flex flex-col">
            <div class="mb-6">
                <h2 id="dilationHeader" class="text-sky-500 font-bold text-xs uppercase tracking-wider leading-relaxed"></h2>
            </div>
            
            <div id="stepCard" class="p-5 bg-slate-900/80 rounded-2xl border border-sky-500/30 shadow-2xl mb-6">
                <div class="flex justify-between items-center mb-3">
                    <span id="stepLabel" class="text-[10px] font-bold text-sky-400 uppercase tracking-widest">Step 1 of 4</span>
                    <span class="text-xs font-bold text-slate-500">k = 2.5</span>
                </div>
                <div class="math-container">
                    <div id="stepMath" class="math-content text-white font-medium"></div>
                </div>
                <div id="stepCoord" class="text-sky-400 font-mono text-sm mt-2"></div>
            </div>

            <div class="space-y-4 flex-1">
                <div class="p-4 bg-slate-900/50 rounded-lg border border-slate-700">
                    <h3 id="instrTitle" class="text-xs font-bold text-slate-400 uppercase mb-2">Instructions</h3>
                    <p id="instrText" class="text-sm text-slate-300 leading-relaxed"></p>
                </div>
            </div>

            <div id="winMsg" class="hidden p-6 bg-green-500/10 border border-green-500/40 rounded-2xl text-center">
                <span id="winText" class="text-green-400 font-bold text-lg animate-pulse">Correct! 🎉</span>
            </div>
        </div>
    </div>
</div>

<script>
    const svg = document.getElementById('canvas');
    const grid = document.getElementById('grid');
    const tooltip = document.getElementById('tooltip');
    const tipText = document.getElementById('tipText');
    const step = 20; 
    const center = 250;
    
    let currentStep = 0;
    let activeNode = null;
    let currentLang = 'en';
    const points = ['J', 'K', 'L', 'M'];

    for(let i=0; i<=500; i+=step) {
        const createLine = (x1, y1, x2, y2) => {
            const l = document.createElementNS("http://www.w3.org/2000/svg", "line");
            l.setAttribute("x1", x1); l.setAttribute("y1", y1); l.setAttribute("x2", x2); l.setAttribute("y2", y2);
            l.setAttribute("class", "grid-line"); grid.appendChild(l);
        };
        createLine(i, 0, i, 500); createLine(0, i, 500, i);
    }

    function updateStepUI() {
        const node = document.getElementById(`node${currentStep}`);
        const p = points[currentStep];
        const ox = node.dataset.origX, oy = node.dataset.origY;
        const tx = node.dataset.tx, ty = node.dataset.ty;

        document.getElementById('dilationHeader').innerText = currentLang === 'en'
            ? `This transformation involves a dilation centered at the origin (0,0) with a scale factor of k = 2.5.`
            : `此变换涉及以原点 (0,0) 为中心的位似变换，缩放因子为 k = 2.5。`;

        document.getElementById('stepLabel').innerText = currentLang === 'en' ? `Step ${currentStep+1} of 4` : `步骤 ${currentStep+1} / 4`;
        
        const mathEl = document.getElementById('stepMath');
        mathEl.innerHTML = `\\(${p}(${ox}, ${oy}) \\rightarrow ${p}'(${ox} \\cdot 2.5, ${oy} \\cdot 2.5)\\)`;
        document.getElementById('stepCoord').innerHTML = `${p}': <span class="font-bold">(${tx}, ${ty})</span>`;
        
        document.getElementById('instrText').innerText = currentLang === 'en' 
            ? `Drag point ${p}' along the dashed line to reach the coordinates (${tx}, ${ty}).`
            : `沿虚线拖动点 ${p}'，直到其坐标达到 (${tx}, ${ty})。`;

        if (window.MathJax) {
            MathJax.typesetPromise().then(() => {
                const container = document.querySelector('.math-container');
                const content = document.getElementById('stepMath');
                const actualWidth = content.scrollWidth;
                const availableWidth = container.offsetWidth;
                if (actualWidth > availableWidth) {
                    const ratio = availableWidth / (actualWidth + 10);
                    content.style.transform = `scale(${ratio})`;
                } else {
                    content.style.transform = `scale(1)`;
                }
            });
        }
    }

    function getMousePos(evt) {
        const CTM = svg.getScreenCTM();
        if (evt.touches) evt = evt.touches[0];
        return { x: (evt.clientX - CTM.e) / CTM.a, y: (evt.clientY - CTM.f) / CTM.d };
    }

    function getConstrainedPos(mouseX, mouseY, targetX, targetY) {
        const tx = center + (targetX * step), ty = center - (targetY * step);
        const dx = tx - center, dy = ty - center;
        const magSq = dx*dx + dy*dy;
        const t = ((mouseX - center)*dx + (mouseY - center)*dy) / magSq;
        const ct = Math.max(0, Math.min(1.0, t));
        return { x: center + ct*dx, y: center + ct*dy };
    }

    document.querySelectorAll('.draggable-node').forEach(node => {
        const start = () => { 
            if(node.classList.contains('active-node')) {
                activeNode = node;
                tooltip.classList.replace('opacity-0', 'opacity-100');
            }
        };
        node.addEventListener('mousedown', start);
        node.addEventListener('touchstart', start);
    });

    window.addEventListener('mousemove', (e) => {
        if (!activeNode) return;
        const mouse = getMousePos(e);
        const tx = parseFloat(activeNode.dataset.tx);
        const ty = parseFloat(activeNode.dataset.ty);
        const pos = getConstrainedPos(mouse.x, mouse.y, tx, ty);
        
        activeNode.setAttribute('cx', pos.x);
        activeNode.setAttribute('cy', pos.y);

        const curX = Math.round((pos.x - center) / step * 10) / 10;
        const curY = Math.round((center - pos.y) / step * 10) / 10;
        tipText.textContent = `(${curX}, ${curY})`;
        tooltip.setAttribute('transform', `translate(${pos.x}, ${pos.y})`);

        const lab = document.getElementById('lab' + currentStep);
        lab.setAttribute('x', pos.x + 8); 
        lab.setAttribute('y', pos.y - 8);

        const dist = Math.sqrt(Math.pow(pos.x - (center + tx*step), 2) + Math.pow(pos.y - (center - ty*step), 2));
        if (dist < 2.5) {
            activeNode.setAttribute('cx', center + tx*step);
            activeNode.setAttribute('cy', center - ty*step);
            activeNode.classList.remove('active-node');
            activeNode.classList.add('node-locked');
            
            lab.textContent = `${points[currentStep]}' (${tx}, ${ty})`;
            lab.classList.add('label-locked');
            lab.setAttribute('x', (center + tx*step) + 10);
            lab.setAttribute('y', (center - ty*step) - 10);

            tooltip.classList.replace('opacity-100', 'opacity-0');
            activeNode = null;

            if (currentStep < 3) {
                currentStep++;
                document.getElementById(`node${currentStep}`).classList.add('active-node');
                document.getElementById(`ray${currentStep}`).classList.add('active-ray');
                document.getElementById(`mark${currentStep}`).classList.add('active-marker');
                updateStepUI();
            } else {
                document.getElementById('dilatedShape').setAttribute('d', 'M 150 50 L 150 350 L 50 350 L 50 150 Z');
                document.getElementById('dilatedShape').classList.replace('opacity-0', 'opacity-100');
                document.getElementById('winMsg').classList.remove('hidden');
                document.getElementById('stepCard').classList.add('opacity-40');
            }
        }
    });

    const stopDrag = () => { if (activeNode) { activeNode = null; tooltip.classList.replace('opacity-100', 'opacity-0'); } };
    window.addEventListener('mouseup', stopDrag);
    window.addEventListener('touchend', stopDrag);

    function setLanguage(l) {
        currentLang = l;
        document.getElementById('enBtn').classList.toggle('active', l === 'en');
        document.getElementById('zhBtn').classList.toggle('active', l === 'zh');
        document.getElementById('winText').innerText = l === 'en' ? 'Correct! 🎉' : '正确！🎉';
        updateStepUI();
    }

    window.onload = () => { updateStepUI(); };
</script>
</body>
</html>
