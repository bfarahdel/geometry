<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Example 3 - Triangle Midsegment Theorem</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js" onload="renderMathInElement(document.body);"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { background-color: #0f172a; font-family: 'Inter', sans-serif; color: #f1f5f9; min-height: 100vh; display: flex; align-items: center; justify-content: center; margin: 0; padding: 20px; overflow: hidden; touch-action: none; }
        .math-card { width: 100%; max-width: 1100px; background: #1e293b; border-radius: 24px; border: 1px solid #334155; overflow: hidden; display: flex; flex-direction: column; height: 750px; position: relative; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); }
        #loader { position: absolute; inset: 0; background: #0f172a; z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: opacity 0.3s ease-out; }
        .content-layout { display: flex; flex: 1; overflow: hidden; }
        .visual-area { flex: 1; background: #0f172a; position: relative; overflow: hidden; }
        .side-panel { width: 360px; background: #1e293b; border-left: 1px solid #334155; padding: 32px; display: flex; flex-direction: column; }
        .grid-line { stroke: #1e293b; stroke-width: 1; }
        .main-triangle { fill: rgba(99, 102, 241, 0.05); stroke: #6366f1; stroke-width: 3; }
        .midsegment { stroke: #10b981; stroke-width: 3; stroke-linecap: round; }
        .svg-vertex-label { font-size: 18px; font-weight: 700; fill: #94a3b8; }
        .svg-measure-label { font-size: 15px; font-weight: 800; fill: #fbbf24; }
        .fraction { display: flex; flex-direction: column; align-items: center; }
        .fraction-line { width: 100%; height: 2px; background: #475569; margin: 4px 0; }
        .inline-input { background: #0f172a; border: 2px solid #334155; border-radius: 8px; padding: 6px; width: 90px; text-align: center; color: #fbbf24; font-size: 1rem; font-weight: bold; outline: none; transition: all 0.3s; }
        .input-success { border-color: #10b981 !important; color: #10b981 !important; background-color: rgba(16, 185, 129, 0.1) !important; }
        .input-fail { border-color: #ef4444 !important; color: #ef4444 !important; background-color: rgba(239, 68, 68, 0.1) !important; }
        .check-btn { background: #10b981; color: white; font-weight: 700; padding: 12px; border-radius: 12px; transition: all 0.2s; text-transform: uppercase; font-size: 0.8rem; letter-spacing: 0.05em; margin-bottom: 24px; }
        .check-btn:hover:not(:disabled) { background: #059669; transform: translateY(-1px); }
        .check-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .nav-btn { flex: 1; background: #334155; color: white; font-weight: 700; border-radius: 12px; transition: all 0.2s; text-transform: uppercase; font-size: 0.75rem; padding: 14px 0; border: 1px solid transparent; }
    </style>
</head>
<body>

<div id="loader">
    <div class="text-emerald-400 font-bold text-xl uppercase tracking-widest animate-pulse">Generating Midsegments...</div>
</div>

<div class="math-card">
    <div class="bg-slate-800/80 p-6 border-b border-slate-700 flex items-center justify-between">
        <div class="flex items-center gap-4">
            <span class="bg-emerald-900/50 text-emerald-400 px-3 py-1 rounded-full text-[10px] font-bold border border-emerald-700 uppercase tracking-widest">Example 3</span>
            <h1 class="text-xl font-bold text-white tracking-tight">Triangle Midsegment Theorem</h1>
        </div>
        <div class="flex bg-slate-900 rounded-lg p-1 border border-slate-700">
            <button onclick="setLanguage('en')" id="enBtn" class="px-3 py-1 text-[10px] font-bold rounded-md bg-emerald-600 text-white">EN</button>
            <button onclick="setLanguage('zh')" id="zhBtn" class="px-3 py-1 text-[10px] font-bold rounded-md text-slate-400">中文</button>
        </div>
    </div>

    <div class="content-layout">
        <div class="visual-area">
            <svg id="canvas" viewBox="0 0 400 350" class="w-full h-full">
                <g id="grid"></g>
                <path d="M 80 250 L 350 250 L 280 80 Z" class="main-triangle" />
                
                <line x1="180" y1="165" x2="215" y2="250" class="midsegment" /> <line x1="315" y1="165" x2="180" y2="165" class="midsegment" /> <text x="70" y="265" class="svg-vertex-label" text-anchor="middle">R</text>
                <text x="360" y="265" class="svg-vertex-label" text-anchor="middle">T</text>
                <text x="280" y="70" class="svg-vertex-label" text-anchor="middle">S</text>
                
                <text x="170" y="160" class="svg-vertex-label" text-anchor="end">X</text>
                <text x="215" y="275" class="svg-vertex-label" text-anchor="middle">Y</text>
                <text x="325" y="160" class="svg-vertex-label" text-anchor="start">Z</text>

                <line x1="80" y1="290" x2="350" y2="290" stroke="#94a3b8" stroke-width="1" marker-start="url(#arrow)" marker-end="url(#arrow)"/>
                <text x="215" y="310" class="svg-measure-label" text-anchor="middle">13</text>
                
                <text x="185" y="220" class="svg-measure-label" text-anchor="end">7</text>
                
                <path d="M 200 165 A 20 20 0 0 1 190 190" fill="none" stroke="#fbbf24" stroke-width="2"/>
                <text x="205" y="185" class="svg-measure-label" text-anchor="start">124°</text>
                
                <defs>
                    <marker id="arrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
                        <path d="M 0 0 L 10 5 L 0 10 z" fill="#94a3b8" />
                    </marker>
                </defs>
            </svg>
        </div>

        <div class="side-panel">
            <div id="step-content" class="flex-1 space-y-6"></div>
            <div id="msg" class="h-6 text-sm font-bold text-center mb-4"></div>
            <button id="checkBtn" onclick="validateAnswer()" class="check-btn w-full">Check Answer</button>
            <div class="flex gap-3 pt-6 border-t border-slate-700">
                <button id="prevBtn" onclick="changeStep(-1)" class="nav-btn">Previous</button>
                <button id="nextBtn" onclick="changeStep(1)" class="nav-btn" disabled>Next</button>
            </div>
        </div>
    </div>
</div>

<script>
    let currentStep = 0, currentLang = 'en', attempts = 0;
    const totalSteps = 3;
    const answers = [[6.5], [14], [124]]; 
    let userProgress = Array(totalSteps).fill(null).map(() => ({val: [], status: null}));

    const translations = {
        en: {
            steps: [
                { title: "Part A: Find XZ", desc: "XZ is a midsegment parallel to RT. \\(XZ = \\frac{1}{2}RT\\).", html: `<div class='flex items-center gap-4 text-xl'>\\(XZ = \\) <input type='number' step='0.1' id='v1' class='inline-input' placeholder='Value'></div>` },
                { title: "Part B: Find ST", desc: "XY is a midsegment parallel to ST. \\(XY = \\frac{1}{2}ST\\).", html: `<div class='flex items-center gap-4 text-xl'>\\(ST = \\) <input type='number' id='v1' class='inline-input' placeholder='Value'></div>` },
                { title: "Part C: Find m∠RYX", desc: "By the Midsegment Theorem, \\(\\overline{XZ} \\parallel \\overline{RT}\\). Identify the alternate interior angle.", html: `<div class='flex items-center gap-4 text-xl'>\\(m\\angle RYX = \\) <input type='number' id='v1' class='inline-input' placeholder='Degrees'>°</div>` }
            ],
            correct: "Excellent!", 
            check: "Check Answer", 
            conclude: "ALL MEASURES FOUND CORRECTLY."
        },
        zh: {
            steps: [
                { title: "部分 A：求 XZ", desc: "XZ 是平行于 RT 的中位线。\\(XZ = \\frac{1}{2}RT\\)。", html: `<div class='flex items-center gap-4 text-xl'>\\(XZ = \\) <input type='number' step='0.1' id='v1' class='inline-input' placeholder='数值'></div>` },
                { title: "部分 B：求 ST", desc: "XY 是平行于 ST 的中位线。\\(XY = \\frac{1}{2}ST\\)。", html: `<div class='flex items-center gap-4 text-xl'>\\(ST = \\) <input type='number' id='v1' class='inline-input' placeholder='数值'></div>` },
                { title: "部分 C：求 m∠RYX", desc: "根据中位线定理，\\(\\overline{XZ} \\parallel \\overline{RT}\\)。找出其内错角。", html: `<div class='flex items-center gap-4 text-xl'>\\(m\\angle RYX = \\) <input type='number' id='v1' class='inline-input' placeholder='度数'>°</div>` }
            ],
            correct: "太棒了！", 
            check: "检查答案",
            conclude: "所有测量值均已正确求出。"
        }
    };

    function renderStep() {
        const isLastStepDone = (userProgress[totalSteps - 1].status !== null);
        const stepData = translations[currentLang].steps[currentStep];
        
        document.getElementById('step-content').innerHTML = `
            <div><h2 class="text-emerald-400 font-bold text-xs uppercase mb-1">${stepData.title}</h2>
            <p class="text-slate-200 text-lg font-semibold">${stepData.desc}</p></div>
            <div class="p-8 bg-slate-900/50 rounded-2xl border border-slate-700 flex justify-center">${stepData.html}</div>
            ${isLastStepDone ? `<div class="p-4 bg-emerald-500/10 border border-emerald-500/40 rounded-xl text-center"><h3 class="text-emerald-400 font-bold text-xs tracking-widest uppercase">${translations[currentLang].conclude}</h3></div>` : ''}
        `;
        
        const msg = document.getElementById('msg'), checkBtn = document.getElementById('checkBtn'), nextBtn = document.getElementById('nextBtn');
        checkBtn.innerText = translations[currentLang].check;
        checkBtn.disabled = false;
        nextBtn.disabled = true;
        document.getElementById('prevBtn').disabled = currentStep === 0;
        msg.innerHTML = "";

        const saved = userProgress[currentStep];
        if (saved.status) {
            const input = document.getElementById('v1');
            if (input) {
                input.value = saved.val[0];
                input.disabled = true;
                input.classList.add(saved.status === 'success' ? 'input-success' : 'input-fail');
            }
            checkBtn.disabled = true;
            if (currentStep < totalSteps - 1) nextBtn.disabled = false;
            if (saved.status === 'success') msg.innerHTML = `<span class="text-emerald-400">${translations[currentLang].correct}</span>`;
        }
        if (window.renderMathInElement) renderMathInElement(document.getElementById('step-content'));
    }

    function validateAnswer() {
        const v1 = parseFloat(document.getElementById('v1').value);
        let isCorrect = (v1 === answers[currentStep][0]);

        if (isCorrect) {
            userProgress[currentStep] = {val: [v1], status: 'success'};
            renderStep();
        } else {
            attempts++;
            const input = document.getElementById('v1');
            input.classList.add('animate-shake', 'border-red-500');
            setTimeout(() => input.classList.remove('animate-shake'), 400);
            if (attempts >= 3) {
                userProgress[currentStep] = {val: answers[currentStep], status: 'fail'};
                renderStep();
            }
        }
    }

    function changeStep(dir) { currentStep += dir; attempts = 0; renderStep(); }
    function setLanguage(lang) { 
        currentLang = lang; 
        document.getElementById('enBtn').className = lang === 'en' ? 'px-3 py-1 text-[10px] font-bold rounded-md bg-emerald-600 text-white' : 'px-3 py-1 text-[10px] font-bold rounded-md text-slate-400';
        document.getElementById('zhBtn').className = lang === 'zh' ? 'px-3 py-1 text-[10px] font-bold rounded-md bg-emerald-600 text-white' : 'px-3 py-1 text-[10px] font-bold rounded-md text-slate-400';
        renderStep(); 
    }

    // Grid helper
    const grid = document.getElementById('grid');
    for(let i=0; i<=400; i+=25) {
        const h = document.createElementNS("http://www.w3.org/2000/svg", "line");
        h.setAttribute("x1",0); h.setAttribute("y1",i); h.setAttribute("x2",400); h.setAttribute("y2",i);
        h.setAttribute("class", "grid-line"); grid.appendChild(h);
        const v = document.createElementNS("http://www.w3.org/2000/svg", "line");
        v.setAttribute("x1",i); v.setAttribute("y1",0); v.setAttribute("x2",i); v.setAttribute("y2",400);
        v.setAttribute("class", "grid-line"); grid.appendChild(v);
    }

    window.onload = () => { setTimeout(() => { document.getElementById('loader').style.display = 'none'; renderStep(); }, 800); };
</script>
</body>
</html>
