<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Example 1 - Triangle Proportionality Theorem</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js" onload="renderMathInElement(document.body);"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { background-color: #0f172a; font-family: 'Inter', sans-serif; color: #f1f5f9; min-height: 100vh; display: flex; align-items: center; justify-content: center; margin: 0; padding: 20px; overflow: hidden; touch-action: none; }
        .math-card { width: 100%; max-width: 1100px; background: #1e293b; border-radius: 24px; border: 1px solid #334155; overflow: hidden; display: flex; flex-direction: column; height: 720px; position: relative; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); }
        #loader { position: absolute; inset: 0; background: #0f172a; z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: opacity 0.3s ease-out; }
        .content-layout { display: flex; flex: 1; overflow: hidden; }
        .visual-area { flex: 1; background: #0f172a; position: relative; overflow: hidden; }
        .side-panel { width: 340px; background: #1e293b; border-left: 1px solid #334155; padding: 32px; display: flex; flex-direction: column; }
        .grid-line { stroke: #1e293b; stroke-width: 1; }
        .main-triangle { fill: rgba(99, 102, 241, 0.05); stroke: #6366f1; stroke-width: 3; }
        .parallel-line { stroke: #fbbf24; stroke-width: 3; stroke-linecap: round; }
        .arrowhead { fill: #fbbf24; }
        .svg-vertex-label { font-size: 18px; font-weight: 700; fill: #94a3b8; }
        .svg-side-label { font-size: 15px; font-weight: 800; fill: #38bdf8; }
        .fraction { display: flex; flex-direction: column; align-items: center; }
        .fraction-line { width: 100%; height: 2px; background: #475569; margin: 4px 0; }
        .inline-input { background: #0f172a; border: 2px solid #334155; border-radius: 8px; padding: 6px; width: 80px; text-align: center; color: #fbbf24; font-size: 1rem; font-weight: bold; outline: none; transition: all 0.3s; }
        .input-success { border-color: #10b981 !important; color: #10b981 !important; background-color: rgba(16, 185, 129, 0.1) !important; }
        .input-fail { border-color: #ef4444 !important; color: #ef4444 !important; background-color: rgba(239, 68, 68, 0.1) !important; }
        .check-btn { background: #7c3aed; color: white; font-weight: 700; padding: 12px; border-radius: 12px; transition: all 0.2s; text-transform: uppercase; font-size: 0.8rem; letter-spacing: 0.05em; margin-bottom: 24px; }
        .check-btn:hover:not(:disabled) { background: #6d28d9; transform: translateY(-1px); }
        .check-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .nav-btn { flex: 1; background: #334155; color: white; font-weight: 700; border-radius: 12px; transition: all 0.2s; text-transform: uppercase; font-size: 0.75rem; padding: 14px 0; border: 1px solid transparent; }
    </style>
</head>
<body>

<div id="loader">
    <div class="text-indigo-400 font-bold text-xl uppercase tracking-widest animate-pulse">Loading Exercise...</div>
</div>

<div class="math-card">
    <div class="bg-slate-800/80 p-6 border-b border-slate-700 flex items-center justify-between">
        <div class="flex items-center gap-4">
            <span class="bg-indigo-900/50 text-indigo-400 px-3 py-1 rounded-full text-[10px] font-bold border border-indigo-700 uppercase tracking-widest">Example 1</span>
            <h1 class="text-xl font-bold text-white tracking-tight">Triangle Proportionality Theorem</h1>
        </div>
        <div class="flex bg-slate-900 rounded-lg p-1 border border-slate-700">
            <button onclick="setLanguage('en')" id="enBtn" class="px-3 py-1 text-[10px] font-bold rounded-md bg-indigo-600 text-white">EN</button>
            <button onclick="setLanguage('zh')" id="zhBtn" class="px-3 py-1 text-[10px] font-bold rounded-md text-slate-400">中文</button>
        </div>
    </div>

    <div class="content-layout">
        <div class="visual-area">
            <svg id="canvas" viewBox="0 0 400 350" class="w-full h-full">
                <g id="grid"></g>
                <path d="M 200 50 L 80 280 L 320 280 Z" class="main-triangle" />
                
                <line x1="128" y1="188" x2="272" y2="188" class="parallel-line" />
                <line x1="80" y1="280" x2="320" y2="280" class="parallel-line" />
                
                <path d="M 195 183 L 205 188 L 195 193" fill="none" stroke="#fbbf24" stroke-width="2"/>
                <path d="M 195 275 L 205 280 L 195 285" fill="none" stroke="#fbbf24" stroke-width="2"/>

                <text x="200" y="35" class="svg-vertex-label" text-anchor="middle">P</text>
                <text x="70" y="300" class="svg-vertex-label" text-anchor="middle">R</text>
                <text x="330" y="300" class="svg-vertex-label" text-anchor="middle">Q</text>
                <text x="115" y="193" class="svg-vertex-label" text-anchor="end">S</text>
                <text x="285" y="193" class="svg-vertex-label" text-anchor="start">T</text>

                <text x="255" y="125" class="svg-side-label" text-anchor="middle">7.5</text>
                <text x="310" y="240" class="svg-side-label" text-anchor="middle">3</text>
                <text x="90" y="240" class="svg-side-label" text-anchor="middle">2.5</text>
                <text x="145" y="125" class="svg-side-label" text-anchor="middle" fill="#fbbf24">?</text>
            </svg>
        </div>

        <div class="side-panel">
            <div id="step-content" class="flex-1 space-y-6"></div>
            <div id="msg" class="h-6 text-sm font-bold text-center mb-4"></div>
            <button id="checkBtn" onclick="validateAnswer()" class="check-btn w-full">Check Answer</button>
            <div class="flex gap-3 pt-6 border-t border-slate-700">
                <button id="prevBtn" onclick="changeStep(-1)" class="nav-btn">Previous</button>
                <button id="nextBtn" onclick="changeStep(1)" class="nav-btn" disabled>Next</button>
            </div>
        </div>
    </div>
</div>

<script>
    let currentStep = 0, currentLang = 'en', attempts = 0;
    const totalSteps = 3;
    const answers = [[7.5, 3], [18.75], [6.25]]; 
    let userProgress = Array(totalSteps).fill(null).map(() => ({val: [], status: null}));

    const translations = {
        en: {
            steps: [
                { title: "Step 1: Set up Proportion", desc: "Use the Triangle Proportionality Theorem to set up the ratio.", html: `<div class='flex items-center gap-4 text-xl'>\\(\\frac{PS}{2.5} =\\) <div class='fraction'><input type='number' step='0.1' id='v1' class='inline-input' placeholder='PT'><div class='fraction-line'></div><input type='number' step='0.1' id='v2' class='inline-input' placeholder='TQ'></div></div>` },
                { title: "Step 2: Cross Multiply", desc: "Apply the Cross Products Property: \\(PS \\cdot 3 = 2.5 \\cdot 7.5\\).", html: `<div class='flex items-center gap-4 text-xl'>\\(3PS =\\) <input type='number' step='0.01' id='v1' class='inline-input' style='width:120px' placeholder='Result'></div>` },
                { title: "Step 3: Solve for PS", desc: "Divide both sides by 3 to find the final length of PS.", html: `<div class='flex items-center gap-4 text-xl'>\\(PS =\\) <input type='number' step='0.01' id='v1' class='inline-input' placeholder='Value'></div>` }
            ],
            correct: "Great job!", 
            check: "Check Answer", 
            conclude: "THE LENGTH OF SIDE PS IS 6.25."
        },
        zh: {
            steps: [
                { title: "第一步：建立比例", desc: "利用三角形比例定理建立比例式。", html: `<div class='flex items-center gap-4 text-xl'>\\(\\frac{PS}{2.5} =\\) <div class='fraction'><input type='number' step='0.1' id='v1' class='inline-input' placeholder='PT'><div class='fraction-line'></div><input type='number' step='0.1' id='v2' class='inline-input' placeholder='TQ'></div></div>` },
                { title: "第二步：交叉相乘", desc: "应用交叉乘积性质：\\(PS \\cdot 3 = 2.5 \\cdot 7.5\\)。", html: `<div class='flex items-center gap-4 text-xl'>\\(3PS =\\) <input type='number' step='0.01' id='v1' class='inline-input' style='width:120px' placeholder='结果'></div>` },
                { title: "第三步：求解 PS", desc: "等式两边同时除以 3，计算 PS 的长度。", html: `<div class='flex items-center gap-4 text-xl'>\\(PS =\\) <input type='number' step='0.01' id='v1' class='inline-input' placeholder='数值'></div>` }
            ],
            correct: "做得好！", 
            check: "检查答案",
            conclude: "边 PS 的长度为 6.25。"
        }
    };

    function renderStep() {
        const isLastStepDone = (userProgress[totalSteps - 1].status !== null);
        const stepData = translations[currentLang].steps[currentStep];
        
        document.getElementById('step-content').innerHTML = `
            <div><h2 class="text-indigo-400 font-bold text-xs uppercase mb-1">${stepData.title}</h2>
            <p class="text-slate-200 text-lg font-semibold">${stepData.desc}</p></div>
            <div class="p-8 bg-slate-900/50 rounded-2xl border border-slate-700 flex justify-center">${stepData.html}</div>
            ${isLastStepDone ? `<div class="p-4 bg-indigo-500/10 border border-indigo-500/40 rounded-xl text-center"><h3 class="text-indigo-400 font-bold text-xs tracking-widest uppercase">${translations[currentLang].conclude}</h3></div>` : ''}
        `;
        
        const msg = document.getElementById('msg'), checkBtn = document.getElementById('checkBtn'), nextBtn = document.getElementById('nextBtn');
        checkBtn.innerText = translations[currentLang].check;
        checkBtn.disabled = false;
        nextBtn.disabled = true;
        document.getElementById('prevBtn').disabled = currentStep === 0;
        msg.innerHTML = "";

        const saved = userProgress[currentStep];
        if (saved.status) {
            const inputs = [document.getElementById('v1'), document.getElementById('v2')];
            inputs.forEach((input, i) => {
                if (input) {
                    input.value = saved.val[i];
                    input.disabled = true;
                    input.classList.add(saved.status === 'success' ? 'input-success' : 'input-fail');
                }
            });
            checkBtn.disabled = true;
            if (currentStep < totalSteps - 1) nextBtn.disabled = false;
            if (saved.status === 'success') msg.innerHTML = `<span class="text-emerald-400">${translations[currentLang].correct}</span>`;
        }
        if (window.renderMathInElement) renderMathInElement(document.getElementById('step-content'));
    }

    function validateAnswer() {
        const v1 = parseFloat(document.getElementById('v1').value);
        const v2El = document.getElementById('v2');
        const v2 = v2El ? parseFloat(v2El.value) : null;
        
        let isCorrect = false;
        if (currentStep === 0) isCorrect = (v1 === 7.5 && v2 === 3);
        else if (currentStep === 1) isCorrect = (v1 === 18.75);
        else if (currentStep === 2) isCorrect = (v1 === 6.25);

        if (isCorrect) {
            userProgress[currentStep] = {val: [v1, v2], status: 'success'};
            renderStep();
        } else {
            attempts++;
            const inputs = [document.getElementById('v1'), document.getElementById('v2')];
            inputs.forEach(el => { if(el) el.classList.add('animate-shake', 'border-red-500'); setTimeout(() => el && el.classList.remove('animate-shake'), 400); });
            if (attempts >= 3) {
                userProgress[currentStep] = {val: answers[currentStep], status: 'fail'};
                renderStep();
            }
        }
    }

    function changeStep(dir) { currentStep += dir; attempts = 0; renderStep(); }
    function setLanguage(lang) { 
        currentLang = lang; 
        document.getElementById('enBtn').className = lang === 'en' ? 'px-3 py-1 text-[10px] font-bold rounded-md bg-indigo-600 text-white' : 'px-3 py-1 text-[10px] font-bold rounded-md text-slate-400';
        document.getElementById('zhBtn').className = lang === 'zh' ? 'px-3 py-1 text-[10px] font-bold rounded-md bg-indigo-600 text-white' : 'px-3 py-1 text-[10px] font-bold rounded-md text-slate-400';
        renderStep(); 
    }

    // Grid helper
    const grid = document.getElementById('grid');
    for(let i=0; i<=400; i+=25) {
        const h = document.createElementNS("http://www.w3.org/2000/svg", "line");
        h.setAttribute("x1",0); h.setAttribute("y1",i); h.setAttribute("x2",400); h.setAttribute("y2",i);
        h.setAttribute("class", "grid-line"); grid.appendChild(h);
        const v = document.createElementNS("http://www.w3.org/2000/svg", "line");
        v.setAttribute("x1",i); v.setAttribute("y1",0); v.setAttribute("x2",i); v.setAttribute("y2",400);
        v.setAttribute("class", "grid-line"); grid.appendChild(v);
    }

    window.onload = () => { setTimeout(() => { document.getElementById('loader').style.display = 'none'; renderStep(); }, 800); };
</script>
</body>
</html>
