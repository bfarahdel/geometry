<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skatepark Geometry: Geometric Mean Theorems</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #111827;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow: hidden;
        }
        h1 {
            margin: 15px 0 4px 0;
            font-size: 2rem; 
            color: #67e8f9;
        }
        h2 {
            margin: 0 0 12px 0;
            font-size: 1.2rem; 
            font-weight: normal;
            color: #9ca3af;
        }
        canvas {
            background: #1f2937;
            box-shadow: 0 10px 30px rgba(0,0,0,0.7);
            border-radius: 6px;
            cursor: crosshair;
            touch-action: none; 
        }
        #stats {
            margin-top: 12px;
            font-family: monospace;
            color: #e5e7eb;
            background: #374151;
            padding: 12px 20px; 
            border-radius: 4px;
            max-width: 860px;
            text-align: center;
            min-height: 24px;
            font-size: 1.15rem; 
            font-weight: bold;
        }
        #controls {
            margin-top: 15px;
            margin-bottom: 15px;
            display: flex;
            gap: 15px;
        }
        button {
            background: #3b82f6;
            color: white;
            border: none;
            padding: 12px 24px; 
            font-size: 1.1rem; 
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s, opacity 0.2s;
            touch-action: manipulation;
        }
        button:hover { background: #60a5fa; }
        button#clear-ramps { background: #ef4444; }
        button#clear-ramps:hover { background: #f87171; }
        
        button#play-btn { background: #4b6584; }
        button#play-btn:hover { background: #778ca3; }
        button#pause-btn { background: #3867d6; }
        button#pause-btn:hover { background: #4b7bec; }

        button#lang-toggle { background: #10b981; }
        button#lang-toggle:hover { background: #34d399; }

        button:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }
    </style>
</head>
<body>

    <h1 id="main-title">🛹 Geometric Mean Skate-Lab</h1>
    <h2 id="sub-title">Altitude Theorem: Height = √(Segment 1 × Segment 2)</h2>
    
    <canvas id="simCanvas"></canvas>
    <div id="stats">👉 PHASE 1: Click/Tap & Drag left-to-right to draw Segment 1 (p).</div>
    
    <div id="controls">
        <button id="clear-ramps">🧹 Clear Ramps</button>
        <button id="reset-skater">🔄 Reset Skater</button>
        <button id="play-btn" disabled>▶️ Play</button>
        <button id="pause-btn">⏸️ Pause</button>
        <button id="lang-toggle">🌐 EN / 中文</button>
    </div>

<script>
const canvas = document.getElementById('simCanvas');
const ctx = canvas.getContext('2d');

canvas.width = 900;
canvas.height = 450;

const GROUND_Y = canvas.height - 50;
const PIXELS_PER_CM = 25;

let currentLang = 'en';
const i18n = {
    en: {
        title: "🛹 Geometric Mean Skate-Lab",
        subtitle: "Altitude Theorem: Height = √(Segment 1 × Segment 2)",
        clearRamps: "🧹 Clear Ramps",
        resetSkater: "🔄 Reset Skater",
        play: "▶️ Play",
        pause: "⏸️ Pause",
        phase1: "👉 PHASE 1: Click/Tap & Drag left-to-right to draw Segment 1 (p).",
        phase2: "📍 Segment 1 saved! Now tap/drag from the flashing green dot to the RIGHT for Segment 2 (q).",
        resetPhase: "🔄 Reset! 👉 PHASE 1: Drag left-to-right to draw Segment 1 (p).",
        rampGenerated: "🎉 Ramp generated! 👉 PHASE 1: Drag to draw another Segment 1.",
        hudHeader: "GEOMETRIC MEAN THEOREM:",
        hudHint: "(Draw segments to run equation)"
    },
    zh: {
        title: "🛹 几何平均值滑板滑道实验室",
        subtitle: "射影定理 (高定理): 高度 = √(线段 1 × 线段 2)",
        clearRamps: "🧹 清除滑道",
        resetSkater: "🔄 重置滑手",
        play: "▶️ 播放",
        pause: "⏸️ 暂停",
        phase1: "👉 阶段 1: 点击/按住并从左向右拖动来绘制线段 1 (p)。",
        phase2: "📍 线段 1 已保存！现在从闪烁的绿点向右拖动来绘制线段 2 (q)。",
        resetPhase: "🔄 已重置！👉 阶段 1: 从左向右拖动来绘制线段 1 (p)。",
        rampGenerated: "🎉 滑道生成成功！👉 阶段 1: 拖动以绘制另一个线段 1。",
        hudHeader: "几何平均值定理 (射影定理):",
        hudHint: "(绘制线段以运行公式计算)"
    }
};

let ramps = [];
let currentDraft = null; 
let isDrawing = false;
let isPaused = false;
let inputPhase = 1; 

let skater = {
    x: 40,
    y: GROUND_Y,
    vx: 3.5,
    vy: 0,
    isAirborne: false,
    isOnHypotenuse: false,
    activeRampRef: null
};

function getCoordinates(e) {
    const rect = canvas.getBoundingClientRect();
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    const clientY = e.touches ? e.touches[0].clientY : e.clientY;
    return { x: clientX - rect.left, y: clientY - rect.top };
}

function startDrawing(e) {
    const coords = getCoordinates(e);
    
    if (inputPhase === 1) {
        isDrawing = true;
        currentDraft = { startX: coords.x, pEnd: coords.x, qEnd: coords.x };
    } else if (inputPhase === 2) {
        if (Math.abs(coords.x - currentDraft.pEnd) < 60) {
            isDrawing = true;
            currentDraft.qEnd = currentDraft.pEnd; 
        } else {
            inputPhase = 1;
            currentDraft = null;
            document.getElementById('stats').innerText = i18n[currentLang].resetPhase;
        }
    }
}

function moveDrawing(e) {
    if (!isDrawing || !currentDraft) return;
    if (e.cancelable) e.preventDefault(); 
    const coords = getCoordinates(e);

    if (inputPhase === 1) {
        if (coords.x > currentDraft.startX + 5) {
            currentDraft.pEnd = coords.x;
        }
    } else if (inputPhase === 2) {
        if (coords.x > currentDraft.pEnd + 5) {
            currentDraft.qEnd = coords.x;
        }
    }
}

function stopDrawing() {
    if (!isDrawing || !currentDraft) return;
    isDrawing = false;

    if (inputPhase === 1) {
        let pWidth = currentDraft.pEnd - currentDraft.startX;
        if (pWidth > 20) {
            inputPhase = 2; 
            document.getElementById('stats').innerText = i18n[currentLang].phase2;
        } else {
            currentDraft = null;
        }
    } else if (inputPhase === 2) {
        let qWidth = currentDraft.qEnd - currentDraft.pEnd;
        if (qWidth > 20) {
            let pWidth = currentDraft.pEnd - currentDraft.startX;
            
            let hPx = Math.sqrt(pWidth * qWidth);
            let peakY = GROUND_Y - hPx;

            ramps.push({
                x1: currentDraft.startX,
                splitX: currentDraft.pEnd,
                x2: currentDraft.qEnd,
                py: peakY,
                pCm: pWidth / PIXELS_PER_CM,
                qCm: qWidth / PIXELS_PER_CM,
                hCm: hPx / PIXELS_PER_CM,
                slopeUp: hPx / pWidth,
                slopeDown: hPx / qWidth
            });

            inputPhase = 1;
            currentDraft = null;
            document.getElementById('stats').innerText = i18n[currentLang].rampGenerated;
        }
    }
}

function toggleLanguage() {
    currentLang = currentLang === 'en' ? 'zh' : 'en';
    
    document.getElementById('main-title').innerText = i18n[currentLang].title;
    document.getElementById('sub-title').innerText = i18n[currentLang].subtitle;
    document.getElementById('clear-ramps').innerText = i18n[currentLang].clearRamps;
    document.getElementById('reset-skater').innerText = i18n[currentLang].resetSkater;
    document.getElementById('play-btn').innerText = i18n[currentLang].play;
    document.getElementById('pause-btn').innerText = i18n[currentLang].pause;
    
    const statsEl = document.getElementById('stats');
    if (inputPhase === 1 && !currentDraft) {
        statsEl.innerText = i18n[currentLang].phase1;
    } else if (inputPhase === 2) {
        statsEl.innerText = i18n[currentLang].phase2;
    }
}

canvas.addEventListener('mousedown', startDrawing);
canvas.addEventListener('mousemove', moveDrawing);
window.addEventListener('mouseup', stopDrawing);

canvas.addEventListener('touchstart', startDrawing, { passive: false });
canvas.addEventListener('touchmove', moveDrawing, { passive: false });
window.addEventListener('touchend', stopDrawing);

document.getElementById('lang-toggle').addEventListener('click', toggleLanguage);

document.getElementById('clear-ramps').addEventListener('click', () => { 
    ramps = []; 
    inputPhase = 1; 
    currentDraft = null; 
    skater.activeRampRef = null; 
    document.getElementById('stats').innerText = i18n[currentLang].phase1; 
});

document.getElementById('reset-skater').addEventListener('click', () => {
    skater.x = 40; skater.y = GROUND_Y; skater.vx = 3.5; skater.vy = 0;
    skater.isAirborne = false; skater.isOnHypotenuse = false; skater.activeRampRef = null;
});

const playBtn = document.getElementById('play-btn');
const pauseBtn = document.getElementById('pause-btn');

playBtn.addEventListener('click', () => {
    isPaused = false;
    playBtn.disabled = true;
    pauseBtn.disabled = false;
});

pauseBtn.addEventListener('click', () => {
    isPaused = true;
    playBtn.disabled = false;
    pauseBtn.disabled = true;
});

function update() {
    if (isPaused) return;

    if (skater.isAirborne) {
        skater.isOnHypotenuse = false;
        skater.activeRampRef = null;
        skater.vy += 0.22;
        skater.x += skater.vx;
        skater.y += skater.vy;
        
        if (skater.y >= GROUND_Y) {
            skater.y = GROUND_Y; skater.vy = 0;
            skater.vx = Math.max(3.5, skater.vx * 0.85);
            skater.isAirborne = false;
        }
    } else {
        let currentRamp = null;
        for (let ramp of ramps) {
            if (skater.x >= ramp.x1 && skater.x <= ramp.x2) {
                currentRamp = ramp;
                break;
            }
        }
        
        if (currentRamp) {
            skater.isOnHypotenuse = true;
            skater.activeRampRef = currentRamp;
            
            if (skater.x <= currentRamp.splitX) {
                let dx = skater.x - currentRamp.x1;
                skater.y = GROUND_Y - (dx * currentRamp.slopeUp);
                skater.vx -= currentRamp.slopeUp * 0.01; 
            } else {
                let dx = currentRamp.x2 - skater.x;
                skater.y = GROUND_Y - (dx * currentRamp.slopeDown);
                skater.vx += currentRamp.slopeDown * 0.02; 
            }
            
            if (skater.vx < 1.5) skater.vx = 1.5;
            skater.x += skater.vx;

            if (skater.x >= currentRamp.x2) {
                skater.isOnHypotenuse = false;
                skater.activeRampRef = null;
            }
        } else {
            skater.isOnHypotenuse = false;
            skater.activeRampRef = null;
            skater.x += skater.vx;
            if (skater.vx < 3.5) skater.vx += 0.1;
        }
    }
    
    if (skater.x > canvas.width + 30) skater.x = -20;
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    // Ground
    ctx.fillStyle = '#374151';
    ctx.fillRect(0, GROUND_Y, canvas.width, canvas.height - GROUND_Y);
    
    // Draw Completed Ramps
    ramps.forEach(ramp => {
        ctx.fillStyle = 'rgba(6, 182, 212, 0.1)';
        ctx.beginPath();
        ctx.moveTo(ramp.x1, GROUND_Y);
        ctx.lineTo(ramp.splitX, ramp.py);
        ctx.lineTo(ramp.x2, GROUND_Y);
        ctx.closePath();
        ctx.fill();

        ctx.strokeStyle = '#06b6d4';
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.moveTo(ramp.x1, GROUND_Y);
        ctx.lineTo(ramp.splitX, ramp.py);
        ctx.lineTo(ramp.x2, GROUND_Y);
        ctx.stroke();

        ctx.strokeStyle = '#ec4899';
        ctx.lineWidth = 3;
        ctx.setLineDash([4, 4]);
        ctx.beginPath(); ctx.moveTo(ramp.splitX, GROUND_Y); ctx.lineTo(ramp.splitX, ramp.py); ctx.stroke();
        ctx.setLineDash([]); 

        ctx.lineWidth = 4;
        ctx.strokeStyle = '#eab308'; 
        ctx.beginPath(); ctx.moveTo(ramp.x1, GROUND_Y); ctx.lineTo(ramp.splitX, GROUND_Y); ctx.stroke();
        
        ctx.strokeStyle = '#a855f7'; 
        ctx.beginPath(); ctx.moveTo(ramp.splitX, GROUND_Y); ctx.lineTo(ramp.x2, GROUND_Y); ctx.stroke();

        ctx.font = 'bold 15px sans-serif';
        ctx.fillStyle = '#eab308';
        ctx.fillText(`p: ${ramp.pCm.toFixed(1)} cm`, (ramp.x1 + ramp.splitX)/2 - 30, GROUND_Y + 22);
        ctx.fillStyle = '#a855f7';
        ctx.fillText(`q: ${ramp.qCm.toFixed(1)} cm`, (ramp.splitX + ramp.x2)/2 - 30, GROUND_Y + 22);
        ctx.fillStyle = '#ec4899';
        ctx.fillText(`h: ${ramp.hCm.toFixed(1)} cm`, ramp.splitX + 8, (GROUND_Y + ramp.py)/2);
    });
    
    if (currentDraft) {
        ctx.lineWidth = 4;
        
        ctx.strokeStyle = '#eab308';
        ctx.beginPath();
        ctx.moveTo(currentDraft.startX, GROUND_Y);
        ctx.lineTo(currentDraft.pEnd, GROUND_Y);
        ctx.stroke();
        
        if (inputPhase === 2) {
            ctx.strokeStyle = '#a855f7';
            ctx.beginPath();
            ctx.moveTo(currentDraft.pEnd, GROUND_Y);
            ctx.lineTo(currentDraft.qEnd, GROUND_Y);
            ctx.stroke();

            let pW = currentDraft.pEnd - currentDraft.startX;
            let qW = currentDraft.qEnd - currentDraft.pEnd;
            if (qW > 5) {
                let hH = Math.sqrt(pW * qW);
                ctx.fillStyle = 'rgba(236, 72, 153, 0.25)';
                ctx.beginPath();
                ctx.moveTo(currentDraft.startX, GROUND_Y);
                ctx.lineTo(currentDraft.pEnd, GROUND_Y - hH);
                ctx.lineTo(currentDraft.qEnd, GROUND_Y);
                ctx.closePath();
                ctx.fill();
            }
            
            ctx.fillStyle = `rgba(34, 197, 94, ${0.4 + Math.sin(Date.now() * 0.01) * 0.4})`;
            ctx.beginPath();
            ctx.arc(currentDraft.pEnd, GROUND_Y, 8, 0, Math.PI * 2);
            ctx.fill();
        }
    }
    
    drawLiveHUD();

    // Render Skater
    ctx.save();
    ctx.translate(skater.x, skater.y);
    ctx.strokeStyle = '#f97316';
    ctx.lineWidth = 4;
    ctx.beginPath(); ctx.moveTo(-14, -2); ctx.lineTo(14, -2); ctx.stroke();
    
    ctx.font = '22px serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'bottom';
    ctx.fillText((skater.isAirborne || skater.isOnHypotenuse) ? '😹' : '🙂', 0, -4);
    ctx.restore();
}

function drawLiveHUD() {
    let pVal = 0, qVal = 0, hVal = 0;
    let isActive = false;

    if (currentDraft && inputPhase === 2) {
        pVal = (currentDraft.pEnd - currentDraft.startX) / PIXELS_PER_CM;
        qVal = (currentDraft.qEnd - currentDraft.pEnd) / PIXELS_PER_CM;
        hVal = Math.sqrt(pVal * qVal);
        isActive = true;
    } 
    else if (skater.activeRampRef) {
        pVal = skater.activeRampRef.pCm;
        qVal = skater.activeRampRef.qCm;
        hVal = skater.activeRampRef.hCm;
        isActive = true;
    }

    // Expanded HUD card width box boundary (from 330 to 380) to clean up layout presentation
    ctx.fillStyle = 'rgba(15, 23, 42, 0.9)';
    ctx.strokeStyle = isActive ? '#06b6d4' : '#4b5563';
    ctx.lineWidth = 2.5;
    ctx.beginPath();
    ctx.roundRect(canvas.width - 400, 20, 380, 115, 8);
    ctx.fill();
    ctx.stroke();

    ctx.textAlign = 'left';
    // Scaled up calculations label font sizing
    ctx.font = 'bold 15px monospace, sans-serif';
    ctx.fillStyle = '#9ca3af';
    ctx.fillText(i18n[currentLang].hudHeader, canvas.width - 380, 45);

    if (isActive) {
        // Significantly scaled up formula outputs from 16px to 18px
        ctx.font = 'bold 18px monospace, sans-serif';
        ctx.fillStyle = '#eab308'; ctx.fillText(`p = ${pVal.toFixed(1)}cm`, canvas.width - 380, 75);
        ctx.fillStyle = '#a855f7'; ctx.fillText(`q = ${qVal.toFixed(1)}cm`, canvas.width - 230, 75);
        
        ctx.fillStyle = '#ec4899';
        ctx.font = 'bold 18px monospace, sans-serif';
        ctx.fillText(`h = √(${pVal.toFixed(1)} × ${qVal.toFixed(1)}) = ${hVal.toFixed(1)}cm`, canvas.width - 380, 110);
    } else {
        ctx.font = '18px monospace, sans-serif';
        ctx.fillStyle = '#6b7280';
        ctx.fillText('h = √(p × q)', canvas.width - 380, 75);
        ctx.font = '14px sans-serif';
        ctx.fillText(i18n[currentLang].hudHint, canvas.width - 380, 105);
    }
}

function loop() { update(); draw(); requestAnimationFrame(loop); }
loop();
</script>
</body>
</html>
