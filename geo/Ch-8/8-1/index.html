<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Skatepark Geometry: Right Triangle Ramps</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #1a1a1a;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
            touch-action: manipulation;
        }
        h1 {
            margin: 10px 0 10px 0;
            font-size: 1.5rem;
            text-align: center;
        }
        .canvas-container {
            width: 95%;
            max-width: 900px;
            margin: 0 auto;
        }
        canvas {
            background: #2f3542;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border-radius: 4px;
            cursor: crosshair;
            width: 100%;
            height: auto;
            display: block;
            touch-action: none; 
        }
        #stats {
            margin-top: 10px;
            font-family: monospace;
            color: #a4b0be;
            text-align: center;
            padding: 0 10px;
            font-size: 0.9rem;
        }
        /* MOVED TO THE BOTTOM: Controls layout structure styling */
        #controls {
            margin-top: 15px;
            margin-bottom: 15px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }
        button {
            background: #ff4757;
            color: white;
            border: none;
            padding: 12px 20px;
            font-size: 0.9rem;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s, opacity 0.2s;
            touch-action: manipulation; 
        }
        button:hover { background: #ff6b81; }
        button#reset-skater { background: #2ed573; }
        button#reset-skater:hover { background: #2bcbba; }
        button#lang-toggle { background: #10b981; }
        button#lang-toggle:hover { background: #34d399; }
        
        /* Pause & Play button custom styles */
        button#pause-btn { background: #3867d6; }
        button#pause-btn:hover { background: #4b7bec; }
        button#play-btn { background: #4b6584; }
        button#play-btn:hover { background: #778ca3; }
        
        /* Style for disabled state */
        button:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }
    </style>
</head>
<body>

    <h1 id="main-title">🛹 Skatepark Geometry</h1>
    
    <div class="canvas-container">
        <canvas id="simCanvas"></canvas>
    </div>
    
    <div id="stats">Click/Tap & Drag from LEFT to RIGHT to build right-triangle ramps!</div>

    <!-- Controls shifted safely to the bottom of the layout structure -->
    <div id="controls">
        <button id="clear-ramps">🧹 Clear Ramps</button>
        <button id="reset-skater">🔄 Reset Skater</button>
        <button id="play-btn" disabled>▶️ Play</button>
        <button id="pause-btn">⏸️ Pause</button>
        <button id="lang-toggle">🌐 EN / 中文</button>
    </div>

<script>
const canvas = document.getElementById('simCanvas');
const ctx = canvas.getContext('2d');

canvas.width = 900;
canvas.height = 500;

const GROUND_Y = canvas.height - 50;
const PIXELS_PER_CM = 30;

// --- Translation System Dictionary ---
let currentLang = 'en';
const i18n = {
    en: {
        title: "🛹 Skatepark Geometry: Right Triangles",
        clearRamps: "🧹 Clear Ramps",
        resetSkater: "🔄 Reset Skater",
        play: "▶️ Play",
        pause: "⏸️ Pause",
        instructions: "Click/Tap & Drag from LEFT to RIGHT to build right-triangle ramps!",
        hypotenuse: "Hypotenuse",
        leg: "Leg",
        rightAngle: "90° Right Angle"
    },
    zh: {
        title: "🛹 滑板几何学: 直角三角形",
        clearRamps: "🧹 清除滑道",
        resetSkater: "🔄 重置滑手",
        play: "▶️ 播放",
        pause: "⏸️ 暂停",
        instructions: "从左向右点击/按住并拖动来建造直角三角形滑道！",
        hypotenuse: "斜边 (弦)",
        leg: "直角边",
        rightAngle: "90° 直角"
    }
};

// Simulation State
let ramps = [];
let isDrawing = false;
let isPaused = false;
let startX = 0;
let startY = 0;
let currentX = 0;
let currentY = 0;

// Skater Object
let skater = {
    x: 50,
    y: GROUND_Y,
    vx: 3, 
    vy: 0,
    isAirborne: false,
    isOnHypotenuse: false
};

// --- Viewport Coordinate Transformation Matrix for Touch Displays ---
function getCoordinates(e) {
    const rect = canvas.getBoundingClientRect();
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    const clientY = e.touches ? e.touches[0].clientY : e.clientY;
    
    return {
        x: (clientX - rect.left) * (canvas.width / rect.width),
        y: (clientY - rect.top) * (canvas.height / rect.height)
    };
}

// --- Input Logic ---
function startDrawing(e) {
    if (e.touches && e.touches.length > 1) return;
    const coords = getCoordinates(e);
    startX = coords.x;
    startY = GROUND_Y; 
    
    isDrawing = true;
    currentX = startX;
    currentY = coords.y;
}

function moveDrawing(e) {
    if (!isDrawing) return;
    if (e.cancelable) e.preventDefault(); 
    
    const coords = getCoordinates(e);
    currentX = coords.x;
    currentY = coords.y;
}

function stopDrawing(e) {
    if (!isDrawing) return;
    isDrawing = false;
    
    if (currentX - startX > 30) {
        let peakY = currentY;
        if (peakY > GROUND_Y - 25) peakY = GROUND_Y - 25; 

        let wPx = currentX - startX;
        let hPx = GROUND_Y - peakY;
        let hypPx = Math.sqrt(wPx*wPx + hPx*hPx);

        ramps.push({
            x1: startX,   
            y1: GROUND_Y,
            x2: currentX, 
            y2: GROUND_Y,
            px: currentX, 
            py: peakY,    
            heightCm: hPx / PIXELS_PER_CM,
            widthCm: wPx / PIXELS_PER_CM,
            hypotenuseCm: hypPx / PIXELS_PER_CM,
            slope: hPx / wPx
        });
    }
}

// --- Event Listeners ---
canvas.addEventListener('mousedown', startDrawing);
canvas.addEventListener('mousemove', moveDrawing);
window.addEventListener('mouseup', stopDrawing);

canvas.addEventListener('touchstart', startDrawing, { passive: false });
canvas.addEventListener('touchmove', moveDrawing, { passive: false });
window.addEventListener('touchend', stopDrawing, { passive: true });

// Controls
document.getElementById('clear-ramps').addEventListener('click', () => { ramps = []; });
document.getElementById('reset-skater').addEventListener('click', () => {
    skater.x = 50;
    skater.y = GROUND_Y;
    skater.vx = 3;
    skater.vy = 0;
    skater.isAirborne = false;
    skater.isOnHypotenuse = false;
});

// Dedicated Play & Pause Actions
const playBtn = document.getElementById('play-btn');
const pauseBtn = document.getElementById('pause-btn');

playBtn.addEventListener('click', () => {
    isPaused = false;
    playBtn.disabled = true;
    pauseBtn.disabled = false;
});

pauseBtn.addEventListener('click', () => {
    isPaused = true;
    playBtn.disabled = false;
    pauseBtn.disabled = true;
});

// Language Switch Logic
document.getElementById('lang-toggle').addEventListener('click', () => {
    currentLang = currentLang === 'en' ? 'zh' : 'en';
    
    // Update HTML elements
    document.getElementById('main-title').innerText = i18n[currentLang].title;
    document.getElementById('clear-ramps').innerText = i18n[currentLang].clearRamps;
    document.getElementById('reset-skater').innerText = i18n[currentLang].resetSkater;
    playBtn.innerText = i18n[currentLang].play;
    pauseBtn.innerText = i18n[currentLang].pause;
    document.getElementById('stats').innerText = i18n[currentLang].instructions;
});

// --- Physics Engine ---
function update() {
    // Stop physics processing if paused
    if (isPaused) return;

    if (skater.isAirborne) {
        skater.isOnHypotenuse = false; 
        skater.vy += 0.25; 
        skater.x += skater.vx;
        skater.y += skater.vy;
        
        if (skater.y >= GROUND_Y) {
            skater.y = GROUND_Y;
            skater.vy = 0;
            skater.vx = Math.max(3, skater.vx * 0.85); 
            skater.isAirborne = false; 
        }
    } else {
        let currentRamp = null;
        
        for (let ramp of ramps) {
            if (skater.x >= ramp.x1 && skater.x <= ramp.x2) {
                currentRamp = ramp;
                break;
            }
        }
        
        if (currentRamp) {
            skater.isOnHypotenuse = true; 
            
            if (skater.x < currentRamp.x2) {
                let horizontalProgress = skater.x - currentRamp.x1;
                let currentRampHeight = horizontalProgress * currentRamp.slope;
                skater.y = GROUND_Y - currentRampHeight;
                
                skater.vx -= currentRamp.slope * 0.015;
                if (skater.vx < 1.5) skater.vx = 1.5; 
                
                skater.x += skater.vx;
            }
            
            if (skater.x >= currentRamp.x2) {
                skater.isAirborne = true;
                skater.isOnHypotenuse = false;
                
                let launchAngle = Math.atan(currentRamp.slope);
                let speedBoost = skater.vx * (1.3 + (currentRamp.slope * 0.2)); 
                
                skater.vx = Math.cos(launchAngle) * speedBoost;
                skater.vy = -Math.sin(launchAngle) * (speedBoost * 0.2); 
            }
        } else {
            skater.isOnHypotenuse = false; 
            skater.x += skater.vx;
            
            if (skater.vx < 3) {
                skater.vx += 0.1; 
            } else if (skater.vx > 3) {
                skater.vx -= 0.02; 
            }
        }
    }
    
    if (skater.x > canvas.width + 30) {
        skater.x = -20;
    }
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    // Ground line
    ctx.fillStyle = '#4b6584';
    ctx.fillRect(0, GROUND_Y, canvas.width, canvas.height - GROUND_Y);
    
    // Ramps Loop
    ramps.forEach(ramp => {
        ctx.fillStyle = 'rgba(165, 177, 194, 0.15)';
        ctx.beginPath();
        ctx.moveTo(ramp.x1, ramp.y1);
        ctx.lineTo(ramp.px, ramp.py);
        ctx.lineTo(ramp.x2, GROUND_Y);
        ctx.closePath();
        ctx.fill();

        // 1. Draw Right Angle Box
        ctx.strokeStyle = '#ff4757';
        ctx.lineWidth = 2;
        let boxSize = 15;
        ctx.beginPath();
        ctx.moveTo(ramp.x2 - boxSize, GROUND_Y);
        ctx.lineTo(ramp.x2 - boxSize, GROUND_Y - boxSize);
        ctx.lineTo(ramp.x2, GROUND_Y - boxSize);
        ctx.stroke();

        // 2. Highlight: Base Leg (Yellow)
        ctx.strokeStyle = '#f1c40f';
        ctx.lineWidth = 4;
        ctx.beginPath();
        ctx.moveTo(ramp.x1, GROUND_Y);
        ctx.lineTo(ramp.x2, GROUND_Y);
        ctx.stroke();

        // 3. Highlight: Vertical Leg (Orange-Pink)
        ctx.strokeStyle = '#ffb8b8';
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.moveTo(ramp.x2, GROUND_Y);
        ctx.lineTo(ramp.px, ramp.py);
        ctx.stroke();

        // 4. Highlight: Hypotenuse (Cyan)
        ctx.strokeStyle = '#00d2d3';
        ctx.lineWidth = 4;
        ctx.beginPath();
        ctx.moveTo(ramp.x1, GROUND_Y);
        ctx.lineTo(ramp.px, ramp.py);
        ctx.stroke();

        // --- Geometric Unit Text Labels (Increased font to 15px) ---
        ctx.font = 'bold 15px sans-serif';
        
        // Hypotenuse Text
        ctx.fillStyle = '#00d2d3';
        let midX = (ramp.x1 + ramp.px) / 2;
        let midY = (GROUND_Y + ramp.py) / 2;
        ctx.fillText(`${i18n[currentLang].hypotenuse} (${ramp.hypotenuseCm.toFixed(1)} cm)`, midX - 75, midY - 15);

        // Vertical Leg Text
        ctx.fillStyle = '#ff9f43';
        ctx.fillText(`${i18n[currentLang].leg} (${ramp.heightCm.toFixed(1)} cm)`, ramp.x2 + 12, (GROUND_Y + ramp.py) / 2 + 5);

        // Base Leg Text
        ctx.fillStyle = '#f1c40f';
        ctx.fillText(`${i18n[currentLang].leg} (${ramp.widthCm.toFixed(1)} cm)`, (ramp.x1 + ramp.x2) / 2 - 45, GROUND_Y + 25);

        // Right Angle Label
        ctx.fillStyle = '#ff4757';
        ctx.fillText(i18n[currentLang].rightAngle, ramp.x2 - 130, GROUND_Y - 8);
    });
    
    // Preview Drawing State
    if (isDrawing) {
        ctx.fillStyle = 'rgba(255, 71, 87, 0.2)';
        let peakY = currentY > GROUND_Y - 25 ? GROUND_Y - 25 : currentY;
        ctx.beginPath();
        ctx.moveTo(startX, GROUND_Y);
        ctx.lineTo(currentX, peakY);
        ctx.lineTo(currentX, GROUND_Y);
        ctx.closePath();
        ctx.fill();
    }
    
    // Skater rendering
    ctx.save();
    ctx.translate(skater.x, skater.y);
    
    ctx.strokeStyle = '#ffa502';
    ctx.lineWidth = 4;
    ctx.beginPath();
    ctx.moveTo(-15, -2);
    ctx.lineTo(15, -2);
    ctx.stroke();
    
    ctx.font = '22px serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'bottom';
    
    let skaterEmoji = (skater.isAirborne || skater.isOnHypotenuse) ? '😹' : '🙂';
    ctx.fillText(skaterEmoji, 0, -4); 
    
    ctx.restore();
}

function loop() {
    update();
    draw();
    requestAnimationFrame(loop);
}

// Initial instructions printout match
document.getElementById('stats').innerText = i18n[currentLang].instructions;

loop();
</script>
</body>
</html>
