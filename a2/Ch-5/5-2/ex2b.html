<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Example 2b - Composition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        window.MathJax = { 
            tex: { inlineMath: [['$', '$']] },
            startup: {
                pageReady: () => {
                    return MathJax.startup.defaultPageReady().then(() => {
                        document.getElementById('math-preview').style.opacity = "1";
                    });
                }
            }
        };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { background-color: #0f172a; font-family: 'Inter', sans-serif; color: #f1f5f9; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; padding: 20px; }
        
        #loading-screen { position: fixed; inset: 0; background: #0f172a; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; transition: opacity 0.5s ease; }
        .spinner { width: 50px; height: 50px; border: 4px solid rgba(124, 58, 237, 0.1); border-top-color: #3b82f6; border-radius: 50%; animation: spin 1s linear infinite; position: relative; }
        #emoji-shuffle { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 1.5rem; }
        @keyframes spin { to { transform: rotate(360deg); } }

        .math-card { width: 100%; max-width: 1000px; background: #1e293b; border-radius: 24px; border: 1px solid #334155; overflow: hidden; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); display: flex; flex-direction: column; }
        .header { background: #0f172a; padding: 1.5rem; border-bottom: 1px solid #334155; display: flex; justify-content: space-between; align-items: center; }
        
        .lang-toggle { display: flex; gap: 0.5rem; background: #1e293b; padding: 0.25rem; border-radius: 0.5rem; border: 1px solid #334155; }
        .lang-btn { padding: 0.5rem 1rem; border-radius: 0.375rem; font-weight: 600; font-size: 0.75rem; cursor: pointer; border: none; transition: all 0.2s; }
        .lang-btn.active { background: #3b82f6; color: #0f172a; }
        .lang-btn:not(.active) { background: transparent; color: #94a3b8; }

        .step-container { display: none; }
        .step-container.active { display: block; }
        .choice-btn { width: 100%; background: #0f172a; border: 1px solid #334155; padding: 1.25rem; text-align: center; transition: all 0.2s; border-radius: 0.75rem; margin-bottom: 0.75rem; color: white; font-size: 1.25rem; }
        .choice-btn:hover { border-color: #3b82f6; background: #1e293b; }

        .substitution-display { background: #0f172a; padding: 1.5rem; border-radius: 12px; margin-bottom: 1.5rem; display: flex; align-items: center; justify-content: center; font-size: 1.75rem; min-height: 80px; opacity: 0; transition: opacity 0.3s ease; border: 1px solid #334155; }
    </style>
</head>
<body>

    <div id="loading-screen">
        <div class="relative mb-4">
            <div class="spinner"></div>
            <div id="emoji-shuffle">🧪</div>
        </div>
        <p class="text-slate-400 animate-pulse font-medium">Loading...</p>
    </div>

    <div class="math-card">
        <div class="header">
            <div>
                <span class="bg-blue-600/20 text-blue-400 px-3 py-1 rounded-full text-[10px] font-bold uppercase tracking-widest border border-blue-600/30">Example 2b</span>
                <h1 id="mainTitle" class="text-xl font-bold text-white mt-2">Algebraic Composition</h1>
            </div>
            <div class="lang-toggle">
                <button onclick="setLanguage('en')" id="enBtn" class="lang-btn active">EN</button>
                <button onclick="setLanguage('zh')" id="zhBtn" class="lang-btn">中文</button>
            </div>
        </div>

        <div class="flex flex-col lg:flex-row flex-grow">
            <div class="w-full lg:w-1/2 p-8 bg-slate-900/30 border-b lg:border-b-0 lg:border-r border-slate-700 text-center">
                <p id="givenTxt" class="text-slate-400 text-sm mb-4">Given:</p>
                <div class="space-y-4 mb-8">
                    <p class="text-purple-400 font-bold text-3xl">$f(x) = x^2 - 1$</p>
                    <p class="text-blue-400 font-bold text-3xl">$g(x) = x + 4$</p>
                </div>
                <div class="p-4 bg-blue-600/10 rounded-xl border border-blue-500/30">
                    <p class="text-slate-300"><b id="solveTxt">Find:</b> $[f \circ g](x)$</p>
                </div>
            </div>

            <div class="w-full lg:w-1/2 p-8 bg-slate-800/20">
                <div id="math-preview" class="substitution-display text-slate-500">
                    $[f \circ g](x) = f(g(x))$
                </div>

                <div id="step1" class="step-container active">
                    <span class="text-[10px] font-bold text-blue-400 uppercase tracking-widest" id="s1Tag">Step 1</span>
                    <p class="text-slate-300 text-lg my-4" id="s1Task">Substitute $g(x)$ into the composition:</p>
                    <button type="button" onclick="pickStep1('f(x + 4)')" class="choice-btn">$f(x + 4)$</button>
                    <button type="button" onclick="pickStep1('f(x^2 - 1)')" class="choice-btn">$f(x^2 - 1)$</button>
                    <p id="err1" class="text-red-400 text-sm mt-2 h-4 text-center"></p>
                </div>

                <div id="step2" class="step-container">
                    <span class="text-[10px] font-bold text-blue-400 uppercase tracking-widest" id="s2Tag">Step 2</span>
                    <p class="text-slate-300 text-lg my-4" id="s2Task">Apply the rule for $f(x) = x^2 - 1$:</p>
                    <button type="button" onclick="pickStep2('(x + 4)^2 - 1')" class="choice-btn">$(x + 4)^2 - 1$</button>
                    <button type="button" onclick="pickStep2('x^2 + 4 - 1')" class="choice-btn">$x^2 + 4 - 1$</button>
                    <p id="err2" class="text-red-400 text-sm mt-2 h-4 text-center"></p>
                </div>

                <div id="step3" class="step-container">
                    <span class="text-[10px] font-bold text-blue-400 uppercase tracking-widest" id="s3Tag">Step 3</span>
                    <p class="text-slate-300 text-lg my-4" id="s3Task">Simplify the expression:</p>
                    <button type="button" onclick="pickStep3('x^2 + 8x + 15')" class="choice-btn">$x^2 + 8x + 15$</button>
                    <button type="button" onclick="pickStep3('x^2 + 15')" class="choice-btn">$x^2 + 15$</button>
                    <p id="err3" class="text-red-400 text-sm mt-2 h-4 text-center"></p>
                </div>

                <div id="step4" class="step-container">
                    <div class="bg-green-500/10 border border-green-500/30 p-6 rounded-xl text-center">
                        <h2 id="completeTitle" class="text-white font-bold text-2xl mb-2">Well Done!</h2>
                        <button type="button" id="restartBtn" onclick="location.reload()" class="w-full mt-4 bg-slate-700 py-3 rounded-lg text-sm hover:bg-slate-600 transition">Restart Exercise</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const emojis = ['🧪', '🧬', '🔭', '📐', '🛰️', '💡'];
        let emojiIdx = 0;
        let currentLang = 'en';

        const emojiInterval = setInterval(() => {
            document.getElementById('emoji-shuffle').innerText = emojis[emojiIdx];
            emojiIdx = (emojiIdx + 1) % emojis.length;
        }, 150);

        window.onload = () => {
            setTimeout(() => {
                clearInterval(emojiInterval);
                document.getElementById('loading-screen').style.opacity = '0';
                setTimeout(() => document.getElementById('loading-screen').style.display = 'none', 500);
            }, 1000);
        };

        const dict = {
            en: {
                title: "Algebraic Composition", given: "Given:", solve: "Find:",
                s1: "Step 1", s1Task: "Substitute $g(x)$ into the composition:",
                s2: "Step 2", s2Task: "Apply the rule for $f(x) = x^2 - 1$:",
                s3: "Step 3", s3Task: "Simplify the expression:",
                wrong: "Incorrect. Try again.", complete: "Well Done!", restart: "Restart Exercise"
            },
            zh: {
                title: "代数复合运算", given: "已知:", solve: "求:",
                s1: "第一步", s1Task: "将 $g(x)$ 代入复合函数:",
                s2: "第二步", s2Task: "应用 $f(x) = x^2 - 1$ 的规则:",
                s3: "第三步", s3Task: "化简表达式:",
                wrong: "错误。再试一次。", complete: "太棒了！", restart: "重新开始"
            }
        };

        function setLanguage(lang) {
            currentLang = lang;
            document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(lang + 'Btn').classList.add('active');
            document.getElementById('mainTitle').innerText = dict[lang].title;
            document.getElementById('givenTxt').innerText = dict[lang].given;
            document.getElementById('solveTxt').innerText = dict[lang].solve;
            document.getElementById('s1Tag').innerText = dict[lang].s1;
            document.getElementById('s1Task').innerText = dict[lang].s1Task;
            document.getElementById('s2Tag').innerText = dict[lang].s2;
            document.getElementById('s2Task').innerText = dict[lang].s2Task;
            document.getElementById('s3Tag').innerText = dict[lang].s3;
            document.getElementById('s3Task').innerText = dict[lang].s3Task;
            document.getElementById('completeTitle').innerText = dict[lang].complete;
            document.getElementById('restartBtn').innerText = dict[lang].restart;
            MathJax.typeset();
        }

        function updatePreview(math) {
            const preview = document.getElementById('math-preview');
            preview.style.opacity = "0";
            setTimeout(() => {
                preview.innerHTML = `$[f \\circ g](x) = ${math}$`;
                preview.classList.replace('text-slate-500', 'text-white');
                MathJax.typesetPromise([preview]).then(() => {
                    preview.style.opacity = "1";
                });
            }, 300);
        }

        function pickStep1(val) {
            if (val === 'f(x + 4)') {
                updatePreview('f(x + 4)');
                document.getElementById('step1').classList.remove('active');
                document.getElementById('step2').classList.add('active');
            } else { document.getElementById('err1').innerText = dict[currentLang].wrong; }
        }

        function pickStep2(val) {
            if (val === '(x + 4)^2 - 1') {
                updatePreview('(x + 4)^2 - 1');
                document.getElementById('step2').classList.remove('active');
                document.getElementById('step3').classList.add('active');
            } else { document.getElementById('err2').innerText = dict[currentLang].wrong; }
        }

        function pickStep3(val) {
            if (val === 'x^2 + 8x + 15') {
                updatePreview('x^2 + 8x + 15');
                document.getElementById('step3').classList.remove('active');
                document.getElementById('step4').classList.add('active');
            } else { document.getElementById('err3').innerText = dict[currentLang].wrong; }
        }
    </script>
</body>
</html>
