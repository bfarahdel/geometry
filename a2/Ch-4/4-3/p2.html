<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dividing by a Monomial - Problem 2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js" onload="renderMathInElement(document.body);"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Fira+Code&display=swap');

        body {
            background-color: #0f172a; 
            background-image: radial-gradient(#1e293b 0.5px, transparent 0.5px);
            background-size: 24px 24px;
            font-family: 'Inter', sans-serif;
            color: #f1f5f9;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            padding: 20px;
        }

        .math-card {
            width: 100%;
            max-width: 1100px;
            background: #1e293b;
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            border: 1px solid #334155;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .division-grid {
            display: grid;
            grid-template-columns: min-content min-content auto;
            font-family: 'Fira Code', monospace;
            line-height: 1.4;
            margin: 2rem auto;
            white-space: pre;
        }

        .div-quotient {
            grid-column: 3;
            padding-bottom: 8px;
            border-bottom: 2px solid #64748b;
            color: #3b82f6; 
            font-weight: bold;
            text-align: right;
            font-size: 1.5rem;
        }

        .div-divisor { 
            grid-column: 1; 
            padding-right: 12px; 
            color: #f59e0b; 
            display: flex; 
            align-items: center;
            font-size: 1.5rem;
        } 
        
        .div-bracket { 
            grid-column: 2; 
            border-left: 2px solid #64748b; 
            border-top: 2px solid #64748b;
            border-top-left-radius: 12px; 
            width: 20px; 
            margin-right: 10px; 
        }
        
        .div-dividend { 
            grid-column: 3; 
            padding-top: 8px; 
            color: #94a3b8;
            font-size: 1.5rem;
        }

        .step-row { 
            grid-column: 3; 
            color: #10b981;
            font-size: 1.3rem;
            margin-top: 8px;
        }
        
        .sub-line { 
            grid-column: 3; 
            border-bottom: 1px solid #475569; 
            margin: 4px 0; 
            width: 100%; 
        }

        #loader {
            position: absolute; inset: 0; background: #0f172a; z-index: 100;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: opacity 0.5s ease-out;
        }

        .step-input {
            width: 140px; 
            background: #0f172a; 
            border: 2px solid #475569; 
            border-radius: 8px;
            padding: 8px; 
            text-align: center; 
            color: #f1f5f9; 
            transition: all 0.3s ease;
            font-size: 1.2rem;
        }

        .input-correct { border-color: #10b981 !important; background: rgba(16, 185, 129, 0.1); }
        .input-error { animation: shake 0.4s; border-color: #f43f5e !important; }

        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }
        .lang-btn.active { background-color: #3b82f6; color: white; }
    </style>
</head>
<body>

<div class="math-card">
    <div id="loader">
        <span id="animalEmoji" class="text-6xl mb-4"></span>
        <div class="text-blue-400 font-bold animate-pulse">LOADING...</div>
    </div>

    <div class="bg-slate-800/80 p-6 border-b border-slate-700 flex items-center justify-between">
        <div class="flex items-center gap-4">
            <span class="bg-blue-500/20 text-blue-400 px-3 py-1 rounded-full text-[10px] font-bold uppercase border border-blue-500/30">Problem 2</span>
            <h1 id="mainTitle" class="text-xl font-bold text-white">Dividing by a Monomial</h1>
        </div>
        <div class="flex items-center gap-3">
            <div class="flex bg-slate-900 rounded-lg p-1 border border-slate-700">
                <button onclick="setLanguage('en')" id="enBtn" class="lang-btn active px-3 py-1 text-[10px] font-bold rounded-md">EN</button>
                <button onclick="setLanguage('zh')" id="zhBtn" class="lang-btn px-3 py-1 text-[10px] font-bold rounded-md text-slate-400">中文</button>
            </div>
            <span class="bg-black/20 px-3 py-1.5 rounded-md text-xs font-bold font-mono text-white/90 border border-slate-700"><span id="pageLabel">PAGE</span> 247</span>
        </div>
    </div>

    <div class="flex flex-col md:flex-row flex-1">
        <div class="w-full md:w-3/5 p-8 flex flex-col items-center justify-center bg-slate-900/30 border-r border-slate-700">
            <div id="problemDisplay" class="text-2xl font-light mb-8">
                Divide \( 2x^3 - 7x^2 - 4x \) by \( 2x \)
            </div>
            
            <div class="division-grid text-xl">
                <div class="div-quotient">
                    <span id="q1" class="invisible">x²</span><span id="q2" class="invisible"> - 3.5x</span><span id="q3" class="invisible"> - 2</span>
                </div>

                <div class="div-divisor">2x</div>
                <div class="div-bracket"></div>
                <div class="div-dividend">2x³ - 7x² - 4x</div>

                <div id="vis-step1" class="hidden contents">
                    <div class="step-row">(-) 2x³</div>
                    <div class="sub-line"></div>
                    <div class="text-slate-400" style="grid-column: 3; margin-top: 4px;">-7x² - 4x</div>
                </div>

                <div id="vis-step2" class="hidden contents">
                    <div class="step-row">(-) -7x²</div>
                    <div class="sub-line"></div>
                    <div class="text-slate-400" style="grid-column: 3; margin-top: 4px;">-4x</div>
                </div>

                <div id="vis-step3" class="hidden contents">
                    <div class="step-row">(-) -4x</div>
                    <div class="sub-line"></div>
                    <div class="text-pink-400 font-bold" style="grid-column: 3; margin-top: 4px;">0</div>
                </div>
            </div>
        </div>

        <div class="w-full md:w-2/5 p-8 flex flex-col bg-slate-800/20">
            <div id="stepContent" class="flex-1">
                <h2 id="stepTitle" class="text-blue-400 font-bold uppercase text-sm mb-4"></h2>
                <p id="stepText" class="text-slate-200 text-lg mb-6"></p>
                
                <div id="inputArea" class="bg-slate-900/50 p-6 rounded-xl border border-slate-700">
                    <div id="formulaPrompt" class="text-xl mb-4"></div>
                    <input type="text" id="mainInput" class="step-input" placeholder="?" autocomplete="off">
                    <button id="checkBtn" class="mt-4 w-full bg-blue-600 py-3 rounded-lg font-bold transition-colors">Check Answer</button>
                    
                    <button id="solveBtn" class="mt-2 w-full border border-amber-500/50 text-amber-500 py-2 rounded-lg font-medium text-sm hidden hover:bg-amber-500/10 transition-all">
                        Show Solution
                    </button>

                    <div id="feedbackContainer" class="mt-4 p-4 rounded-lg bg-slate-900 border border-slate-700 hidden text-center">
                        <p id="feedback" class="text-base font-bold text-emerald-400"></p>
                    </div>
                </div>
            </div>

            <div class="mt-8 flex items-center justify-between border-t border-slate-700 pt-6">
                <button id="prevBtn" class="opacity-50 text-slate-400" disabled>PREV</button>
                <span id="stepCounter" class="text-xs font-mono text-slate-500"></span>
                <button id="nextBtn" class="bg-blue-600 px-6 py-2 rounded-lg font-bold opacity-30" disabled>NEXT</button>
            </div>
        </div>
    </div>
</div>

<script>
    const translations = {
        en: {
            title: "Dividing by a Monomial",
            correctMsg: "Correct! Proceed to the next step.",
            finalMsg: "Complete! The quotient is x² - 3.5x - 2.\nCode: lion",
            steps: [
                { t: "Step 1: First Term", p: "Divide 2x³ by 2x:", ans: "x^2", text: "Divide the first term of the dividend by the monomial divisor. The coefficients cancel (2÷2=1) and x³÷x=x²." },
                { t: "Step 2: Second Term", p: "Divide -7x² by 2x:", ans: "-3.5x", text: "Divide -7 by 2 to get -3.5, and x²÷x=x." },
                { t: "Step 3: Third Term", p: "Divide -4x by 2x:", ans: "-2", text: "Divide -4 by 2 to get -2, and x÷x=1." }
            ]
        },
        zh: {
            title: "单项式除法",
            correctMsg: "正确！请继续下一步。",
            finalMsg: "完成！商式为 x² - 3.5x - 2。\nCode: lion",
            steps: [
                { t: "步骤 1: 第一项", p: "用 2x³ 除以 2x:", ans: "x^2", text: "将被除数的第一项除以单项式除数。系数相消（2÷2=1），x³÷x=x²。" },
                { t: "步骤 2: 第二项", p: "用 -7x² 除以 2x:", ans: "-3.5x", text: "-7 除以 2 得到 -3.5，x²÷x=x。" },
                { t: "步骤 3: 第三项", p: "用 -4x 除以 2x:", ans: "-2", text: "-4 除以 2 得到 -2，x÷x=1。" }
            ]
        }
    };

    let currentLang = 'en';
    let currentStep = 0;
    let failureCount = 0;
    let stepState = [false, false, false]; 
    const animals = ['🦁', '🐯', '🦊', '🐼', '🐨'];

    function setLanguage(lang) {
        currentLang = lang;
        document.getElementById('enBtn').classList.toggle('active', lang === 'en');
        document.getElementById('zhBtn').classList.toggle('active', lang === 'zh');
        updateUI();
    }

    function updateUI() {
        const step = translations[currentLang].steps[currentStep];
        document.getElementById('stepTitle').innerText = step.t;
        document.getElementById('stepText').innerText = step.text;
        document.getElementById('formulaPrompt').innerText = step.p;
        document.getElementById('stepCounter').innerText = `STEP ${currentStep + 1} / 3`;
        
        failureCount = 0;
        document.getElementById('solveBtn').classList.add('hidden');
        
        if (stepState[currentStep]) {
            document.getElementById('mainInput').value = step.ans;
            document.getElementById('mainInput').classList.add('input-correct');
            document.getElementById('checkBtn').classList.add('hidden');
            document.getElementById('feedbackContainer').classList.remove('hidden');
            
            if (currentStep === 2) {
                document.getElementById('feedback').innerText = translations[currentLang].finalMsg;
                document.getElementById('nextBtn').disabled = true;
                document.getElementById('nextBtn').style.opacity = "0.1";
            } else {
                document.getElementById('feedback').innerText = translations[currentLang].correctMsg;
                document.getElementById('nextBtn').disabled = false;
                document.getElementById('nextBtn').style.opacity = "1";
            }
        } else {
            document.getElementById('checkBtn').classList.remove('hidden');
            document.getElementById('feedbackContainer').classList.add('hidden');
            document.getElementById('mainInput').classList.remove('input-correct');
            document.getElementById('mainInput').value = '';
            document.getElementById('nextBtn').disabled = true;
            document.getElementById('nextBtn').style.opacity = "0.3";
        }

        const prevBtn = document.getElementById('prevBtn');
        prevBtn.disabled = currentStep === 0;
        prevBtn.style.opacity = currentStep === 0 ? "0.5" : "1";

        if (window.renderMathInElement) {
            renderMathInElement(document.body);
        }
    }

    function handleSuccess() {
        stepState[currentStep] = true;
        
        if (currentStep >= 0) { 
            document.getElementById('q1').classList.remove('invisible'); 
            document.getElementById('vis-step1').classList.remove('hidden');
        }
        if (currentStep >= 1) { 
            document.getElementById('q2').classList.remove('invisible'); 
            document.getElementById('vis-step2').classList.remove('hidden');
        }
        if (currentStep >= 2) { 
            document.getElementById('q3').classList.remove('invisible'); 
            document.getElementById('vis-step3').classList.remove('hidden');
        }
        
        updateUI();
    }

    document.getElementById('checkBtn').onclick = () => {
        const step = translations[currentLang].steps[currentStep];
        const val = document.getElementById('mainInput').value.trim().toLowerCase().replace(/\s/g, '');
        const expected = step.ans.toLowerCase().replace(/\s/g, '');
        
        // Also accept -7/2x as alternative to -3.5x
        let isCorrect = val === expected;
        if (currentStep === 1 && !isCorrect) {
            isCorrect = val === '-7/2x' || val === '-7/2' || val === '-3.5';
        }
        
        if (isCorrect) { 
            handleSuccess(); 
        } else {
            failureCount++;
            document.getElementById('mainInput').classList.add('input-error');
            setTimeout(() => document.getElementById('mainInput').classList.remove('input-error'), 400);
            
            if (failureCount >= 3) {
                document.getElementById('solveBtn').classList.remove('hidden');
            }
        }
    };

    document.getElementById('solveBtn').onclick = () => {
        document.getElementById('mainInput').value = translations[currentLang].steps[currentStep].ans;
        handleSuccess();
    };

    document.getElementById('nextBtn').onclick = () => { 
        if (currentStep < 2) { 
            currentStep++; 
            updateUI(); 
        } 
    };
    
    document.getElementById('prevBtn').onclick = () => { 
        if (currentStep > 0) { 
            currentStep--; 
            updateUI(); 
        } 
    };

    window.onload = () => {
        document.getElementById('animalEmoji').innerText = animals[Math.floor(Math.random()*animals.length)];
        setTimeout(() => {
            document.getElementById('loader').style.opacity = '0';
            setTimeout(() => document.getElementById('loader').style.display = 'none', 500);
        }, 1500);
        updateUI();
    };
</script>

</body>
</html>
