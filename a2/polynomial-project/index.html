<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Polynomial Productions</title>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css"
    />
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>

    <style>
      :root {
        --primary: #2c3e50;
        --accent: #e67e22;
        --bg-factory: #dcdde1;
        --iron: #7f8c8d;
        --lcd: #2ecc71;
        --panel: #2f3640;
        --toggle-bg: #1e272e;
        --toggle-blue: #488df5;
        --toggle-grey: #a0acba;
        --lab-bg: #2d3436;
      }

      body {
        font-family: "Courier New", Courier, monospace;
        margin: 0;
        background-color: var(--bg-factory);
        color: var(--primary);
        overflow-x: hidden;
      }

      .top-bar {
        width: 100%;
        padding: 15px 0;
        background: var(--panel);
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 10px;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
        position: sticky;
        top: 0;
        z-index: 1000;
      }

      .app-title {
        color: var(--accent);
        margin: 0;
        font-size: 1.6rem;
        letter-spacing: 2px;
        text-transform: uppercase;
        text-shadow: 2px 2px 0px #000;
        z-index: 5;
      }

      .gear {
        fill: var(--iron);
        animation: spin var(--speed) linear infinite;
        transform-origin: center;
        position: absolute;
        pointer-events: none;
      }
      .gear-rev {
        animation-direction: reverse;
      }
      @keyframes spin {
        from {
          transform: rotate(0deg);
        }
        to {
          transform: rotate(360deg);
        }
      }

      .header-cluster-right,
      .header-cluster-left {
        position: absolute;
        top: 5px;
        height: 60px;
        width: 120px;
      }
      .header-cluster-left {
        left: 15px;
      }
      .header-cluster-right {
        right: 15px;
      }

      .robot {
        position: absolute;
        animation: hover 3s ease-in-out infinite;
        filter: drop-shadow(2px 4px 5px rgba(0, 0, 0, 0.2));
      }
      .eye {
        fill: #fff;
        animation: blink 4s infinite;
      }
      @keyframes hover {
        0%,
        100% {
          transform: translateY(0);
        }
        50% {
          transform: translateY(-10px);
        }
      }
      @keyframes blink {
        0%,
        90%,
        100% {
          opacity: 1;
        }
        95% {
          opacity: 0;
        }
      }

      .switch-lang,
      .switch-form {
        position: relative;
        display: inline-block;
        cursor: pointer;
        border-radius: 8px;
        z-index: 10;
      }
      .switch-lang {
        width: 90px;
        height: 30px;
      }
      .switch-form {
        width: 180px;
        height: 34px;
      }

      .switch-lang input,
      .switch-form input {
        opacity: 0;
        width: 0;
        height: 0;
      }

      .toggle-track {
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background-color: var(--toggle-bg);
        transition: 0.4s;
        border-radius: 8px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 12px;
        border: 1px solid rgba(255, 255, 255, 0.1);
      }
      .lang-text,
      .form-text {
        font-family: sans-serif;
        font-weight: 900;
        font-size: 0.7rem;
        z-index: 5;
        color: var(--toggle-grey);
      }

      .toggle-thumb {
        position: absolute;
        height: 28px;
        width: 85px;
        left: 3px;
        bottom: 3px;
        background-color: var(--toggle-blue);
        transition: 0.4s;
        border-radius: 6px;
        z-index: 2;
      }
      .switch-lang .toggle-thumb {
        width: 42px;
        height: 24px;
      }

      input:checked ~ .toggle-thumb {
        transform: translateX(89px);
      }
      .switch-lang input:checked ~ .toggle-thumb {
        transform: translateX(42px);
      }
      input:not(:checked) ~ .toggle-track .label-left {
        color: #fff;
      }
      input:checked ~ .toggle-track .label-right {
        color: #fff;
      }

      .factory-floor {
        max-width: 1200px;
        width: 98%;
        margin: 20px auto;
        display: grid;
        grid-template-columns: 380px 1fr;
        gap: 20px;
      }

      .control-panel {
        background: #c7c8cc;
        padding: 20px;
        border-radius: 10px;
        border: 5px solid var(--iron);
        position: relative;
      }

      .type-btn {
        position: relative;
        width: 100%;
        padding: 12px;
        margin-bottom: 8px;
        border: 2px solid var(--iron);
        border-radius: 4px;
        cursor: pointer;
        font-weight: 900;
        background: rgba(245, 246, 250, 0.9);
        text-align: left;
        font-family: "Courier New", Courier, monospace;
        text-transform: uppercase;
      }
      .type-btn.active {
        background: var(--accent);
        color: white;
      }
      .check-mark {
        position: absolute;
        right: 10px;
        top: 50%;
        transform: translateY(-50%);
        color: var(--lcd);
        font-size: 1.2rem;
        display: none;
      }

      .inspect-hud {
        display: none;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
        margin-top: 20px;
        padding: 15px;
        background: #1e272e;
        border-radius: 5px;
      }
      .dial-label {
        font-size: 0.7rem;
        font-weight: bold;
        color: var(--lcd);
        text-align: center;
        display: block;
        margin-bottom: 10px;
      }
      .dial-wrapper {
        position: relative;
        width: 130px;
        height: 130px;
        margin: 0 auto;
        display: flex;
        justify-content: center;
        align-items: center;
      }
      .dial-num {
        position: absolute;
        width: 15px;
        height: 15px;
        text-align: center;
        font-size: 11px;
        font-weight: bold;
        color: #7f8c8d;
      }
      .dial-container {
        width: 70px;
        height: 70px;
        position: relative;
        cursor: pointer;
        background: #222;
        border-radius: 50%;
        border: 3px solid var(--iron);
        z-index: 2;
      }
      .dial-container.locked {
        border-color: var(--lcd);
        box-shadow: 0 0 8px var(--lcd);
      }
      .knob {
        width: 100%;
        height: 100%;
        transition: 0.3s;
        position: relative;
      }
      .knob::after {
        content: "";
        position: absolute;
        top: 8px;
        left: 50%;
        width: 4px;
        height: 15px;
        background: var(--accent);
        transform: translateX(-50%);
        border-radius: 2px;
      }

      .display-screen {
        background: #2f3640;
        color: var(--lcd);
        padding: 25px;
        border-radius: 10px;
        border: 8px solid var(--iron);
        margin-bottom: 20px;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100px;
        font-size: 1.7rem;
      }

      .chart-box {
        background: white;
        border-radius: 10px;
        border: 4px solid var(--iron);
        height: 400px;
        padding: 10px;
        position: relative;
      }

      .analysis-lab {
        background: var(--lab-bg);
        border-radius: 12px;
        border: 4px solid var(--iron);
        margin-top: 20px;
        overflow: hidden;
        display: none;
        box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
      }
      .lab-header {
        background: #1e272e;
        color: var(--accent);
        padding: 10px 15px;
        font-weight: bold;
        border-bottom: 2px solid var(--accent);
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .lab-status {
        font-size: 0.6rem;
        color: var(--lcd);
        text-transform: uppercase;
        letter-spacing: 2px;
      }
      .lab-content {
        padding: 20px;
        color: #ecf0f1;
      }
      .lab-row {
        margin-bottom: 15px;
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      .input-box {
        width: 80px;
        padding: 8px;
        background: #000;
        border: 1px solid var(--iron);
        color: var(--lcd);
        border-radius: 4px;
        text-align: center;
      }
      .input-box:disabled {
        color: var(--lcd);
        border-color: var(--lcd);
        background: #1b262c;
      }
      .res-icon {
        width: 25px;
        margin-left: 10px;
        font-weight: bold;
        color: var(--lcd);
      }

      #report-btn {
        width: 100%;
        padding: 15px;
        margin-top: 20px;
        background: var(--lcd);
        color: white;
        font-weight: bold;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        font-family: "Courier New", Courier, monospace;
      }

      /* Modal Styles */
      .modal {
        display: none;
        position: fixed;
        z-index: 2000;
        left: 0;
        top: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.7);
      }
      .modal-content {
        background: #fff;
        margin: 5% auto;
        padding: 20px;
        width: 80%;
        border-radius: 10px;
        color: #000;
        max-height: 80vh;
        overflow-y: auto;
        position: relative;
      }

      .modal-close-x {
        position: absolute;
        top: 15px;
        right: 20px;
        font-size: 24px;
        font-weight: bold;
        cursor: pointer;
        color: var(--iron);
        transition: 0.3s;
      }
      .modal-close-x:hover {
        color: #e74c3c;
      }

      .report-controls {
        display: flex;
        justify-content: center;
        gap: 20px;
        margin-top: 20px;
      }
      .report-btn-style {
        padding: 10px 25px;
        font-family: "Courier New", Courier, monospace;
        font-weight: bold;
        text-transform: uppercase;
        cursor: pointer;
        border: 2px solid var(--iron);
        border-radius: 4px;
        transition: 0.3s;
      }
      .close-btn {
        background: #e74c3c;
        color: white;
      }
      .close-btn:hover {
        background: #c0392b;
      }
      .download-btn {
        background: var(--toggle-blue);
        color: white;
      }
      .download-btn:hover {
        background: #3471c2;
      }
    </style>
  </head>
  <body>
    <div class="top-bar">
      <div class="header-cluster-left">
        <svg
          class="gear"
          style="top: 5px; left: 10px; --speed: 6s"
          width="35"
          height="35"
          viewBox="0 0 100 100"
        >
          <path
            d="M50 35a15 15 0 1 0 0 30 15 15 0 0 0 0-30zm35 15a35 35 0 0 1-5.6 19l8.6 8.6-7 7-8.6-8.6A35 35 0 0 1 50 85v12h-10V85a35 35 0 0 1-19-5.6l-8.6 8.6-7-7 8.6-8.6A35 35 0 0 1 15 50H3v-10h12a35 35 0 0 1 5.6-19l-8.6-8.6 7-7 8.6 8.6A35 35 0 0 1 40 15V3h10v12a35 35 0 0 1 19 5.6l 8.6-8.6 7 7-8.6 8.6A35 35 0 0 1 85 40h12v10H85z"
          />
        </svg>
      </div>
      <div class="header-cluster-right">
        <svg
          class="gear gear-rev"
          style="top: 10px; right: 15px; --speed: 4s"
          width="30"
          height="30"
          viewBox="0 0 100 100"
        >
          <path
            d="M50 35a15 15 0 1 0 0 30 15 15 0 0 0 0-30zm35 15a35 35 0 0 1-5.6 19l8.6 8.6-7 7-8.6-8.6A35 35 0 0 1 50 85v12h-10V85a35 35 0 0 1-19-5.6l-8.6 8.6-7-7 8.6-8.6A35 35 0 0 1 15 50H3v-10h12a35 35 0 0 1 5.6-19l-8.6-8.6 7-7 8.6 8.6A35 35 0 0 1 40 15V3h10v12a35 35 0 0 1 19 5.6l 8.6-8.6 7 7-8.6 8.6A35 35 0 0 1 85 40h12v10H85z"
          />
        </svg>
      </div>

      <h1 class="app-title" id="main-title">Polynomial Productions</h1>
      <label class="switch-lang">
        <input type="checkbox" id="lang-toggle" onchange="updateUI()" />
        <div class="toggle-track">
          <span class="lang-text label-left" id="text-en">EN</span>
          <span class="lang-text label-right" id="text-zh">中文</span>
        </div>
        <div class="toggle-thumb"></div>
      </label>
    </div>

    <div class="factory-floor">
      <div class="control-panel">
        <svg
          class="robot"
          style="top: 10px; left: 10px; width: 40px"
          viewBox="0 0 100 100"
        >
          <rect x="20" y="30" width="60" height="50" rx="10" fill="#7f8c8d" />
          <circle class="eye" cx="40" cy="50" r="5" />
          <circle class="eye" cx="60" cy="50" r="5" />
        </svg>

        <div id="type-grid">
          <button class="type-btn" id="btn-1" onclick="generate(1, this)">
            Linear <span class="check-mark" id="check-1">✔</span>
          </button>
          <button class="type-btn" id="btn-2" onclick="generate(2, this)">
            Quadratic <span class="check-mark" id="check-2">✔</span>
          </button>
          <button class="type-btn" id="btn-3" onclick="generate(3, this)">
            Cubic <span class="check-mark" id="check-3">✔</span>
          </button>
          <button class="type-btn" id="btn-4" onclick="generate(4, this)">
            Quartic <span class="check-mark" id="check-4">✔</span>
          </button>
          <button class="type-btn" id="btn-5" onclick="generate(5, this)">
            Quintic <span class="check-mark" id="check-5">✔</span>
          </button>
        </div>

        <div style="text-align: center; margin: 20px 0">
          <label class="switch-form">
            <input
              type="checkbox"
              id="form-toggle"
              onchange="renderEquation()"
            />
            <div class="toggle-track">
              <span class="form-text label-left" id="lbl-fact">FACTORED</span>
              <span class="form-text label-right" id="lbl-std">STANDARD</span>
            </div>
            <div class="toggle-thumb"></div>
          </label>
        </div>

        <div id="inspect-hud" class="inspect-hud">
          <div>
            <span id="txt-deg" class="dial-label">DEGREE</span>
            <div class="dial-wrapper">
              <div class="dial-numbers" id="nums-deg"></div>
              <div
                id="cont-degree"
                class="dial-container"
                onclick="rotateDial('degree')"
              >
                <div id="k-deg" class="knob"></div>
              </div>
            </div>
          </div>
          <div>
            <span id="txt-zro" class="dial-label">REAL ZEROS</span>
            <div class="dial-wrapper">
              <div class="dial-numbers" id="nums-roots"></div>
              <div
                id="cont-roots"
                class="dial-container"
                onclick="rotateDial('roots')"
              >
                <div id="k-roots" class="knob"></div>
              </div>
            </div>
          </div>
        </div>

        <button id="report-btn" onclick="showReport()">GENERATE REPORT</button>
      </div>

      <div class="main">
        <div class="display-screen"><div id="eq-display"></div></div>
        <div class="chart-box">
          <svg
            class="robot"
            style="bottom: 10px; right: 10px; width: 35px; z-index: 5"
            viewBox="0 0 100 100"
          >
            <rect x="25" y="30" width="50" height="40" rx="5" fill="#2ecc71" />
            <circle class="eye" cx="40" cy="45" r="4" />
            <circle class="eye" cx="60" cy="45" r="4" />
          </svg>
          <canvas id="factoryChart"></canvas>
        </div>

        <div id="analysis-lab" class="analysis-lab">
          <div class="lab-header">
            <span>ANALYSIS LAB</span
            ><span class="lab-status">● System Active</span>
          </div>
          <div class="lab-content">
            <div class="lab-row">
              <span id="txt-root">Identify a root x = </span>
              <div>
                <input
                  type="text"
                  class="input-box"
                  id="ans-root"
                  oninput="checkLab()"
                /><span id="res-root" class="res-icon"></span>
              </div>
            </div>
            <div class="lab-row">
              <span id="txt-extr">Number of extrema: </span>
              <div>
                <input
                  type="number"
                  class="input-box"
                  id="ans-extr"
                  oninput="checkLab()"
                /><span id="res-extr" class="res-icon"></span>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div id="report-modal" class="modal">
      <div class="modal-content">
        <span
          class="modal-close-x"
          onclick="
            document.getElementById('report-modal').style.display = 'none'
          "
          >&times;</span
        >
        <div id="report-body"></div>
      </div>
    </div>

    <script>
      let currentRoots = [],
        currentDegree = 0,
        chart,
        currentEq = "";
      let dialVals = { degree: 0, roots: 0 },
        locks = { degree: false, roots: false },
        labLocks = { root: false, extrema: false };
      let mastery = { 1: false, 2: false, 3: false, 4: false, 5: false };
      let reportData = {};

      function createCalibrations(id) {
        const container = document.getElementById(id);
        for (let i = 0; i <= 6; i++) {
          const span = document.createElement("div");
          span.className = "dial-num";
          const angle = (i / 6) * 300 - 150;
          const x = 65 + 52 * Math.sin((angle * Math.PI) / 180) - 7;
          const y = 65 - 52 * Math.cos((angle * Math.PI) / 180) - 7;
          span.innerText = i;
          span.style.left = `${x}px`;
          span.style.top = `${y}px`;
          container.appendChild(span);
        }
      }

      function rotateDial(t) {
        if (locks[t]) return;
        dialVals[t] = (dialVals[t] + 1) % 7;
        document.getElementById(
          "k-" + (t == "degree" ? "deg" : "roots"),
        ).style.transform = `rotate(${(dialVals[t] / 6) * 300 - 150}deg)`;
        validate();
      }

      function validate() {
        if (dialVals.degree === currentDegree) {
          locks.degree = true;
          document.getElementById("cont-degree").classList.add("locked");
        }
        if (dialVals.roots === new Set(currentRoots).size) {
          locks.roots = true;
          document.getElementById("cont-roots").classList.add("locked");
        }
        if (locks.degree && locks.roots)
          document.getElementById("analysis-lab").style.display = "block";
      }

      function updateUI() {
        const zh = document.getElementById("lang-toggle").checked;
        document.getElementById("main-title").innerText = zh
          ? "多项式制作"
          : "Polynomial Productions";
        document.getElementById("lbl-fact").innerText = zh
          ? "因式形式"
          : "FACTORED";
        document.getElementById("lbl-std").innerText = zh
          ? "标准形式"
          : "STANDARD";
        document.getElementById("txt-deg").innerText = zh ? "阶数" : "DEGREE";
        document.getElementById("txt-zro").innerText = zh
          ? "实数零点"
          : "REAL ZEROS";
        document.getElementById("txt-root").innerText = zh
          ? "识别一个根 x = "
          : "Identify a root x = ";
        document.getElementById("txt-extr").innerText = zh
          ? "极值点数量: "
          : "Number of extrema: ";
        document.getElementById("report-btn").innerText = zh
          ? "生成报告"
          : "GENERATE REPORT";
      }

      function generate(d, btn) {
        document
          .querySelectorAll(".type-btn")
          .forEach((b) => b.classList.remove("active"));
        btn.classList.add("active");
        currentDegree = d;
        currentRoots = Array.from(
          { length: d },
          () => Math.floor(Math.random() * 14) - 7,
        );

        document.getElementById("form-toggle").checked = d === 1;
        document.getElementById("inspect-hud").style.display = "grid";
        document.getElementById("analysis-lab").style.display = "none";
        dialVals = { degree: 0, roots: 0 };
        locks = { degree: false, roots: false };
        labLocks = { root: false, extrema: false };

        document
          .querySelectorAll(".dial-container")
          .forEach((c) => c.classList.remove("locked"));
        document.querySelectorAll(".input-box").forEach((i) => {
          i.value = "";
          i.disabled = false;
        });
        document
          .querySelectorAll(".res-icon")
          .forEach((s) => (s.innerText = ""));

        renderEquation();
        drawChart();
      }

      function renderEquation() {
        const isStd = document.getElementById("form-toggle").checked;
        let s = "f(x) = ";

        if (!isStd) {
          // 1. Count the frequency of each root
          const rootCounts = {};
          currentRoots.forEach((r) => {
            rootCounts[r] = (rootCounts[r] || 0) + 1;
          });

          // 2. Handle the zero roots first for a clean leading term (e.g., x^2)
          if (rootCounts[0]) {
            const exp = rootCounts[0];
            s += exp > 1 ? `x^{${exp}}` : `x`;
            delete rootCounts[0]; // Remove from object so it's not processed again
          }

          // 3. Handle the remaining non-zero roots
          Object.keys(rootCounts).forEach((r) => {
            const val = parseFloat(r);
            const exp = rootCounts[r];
            const term = `(x ${val < 0 ? "+" : "-"} ${Math.abs(val)})`;
            s += exp > 1 ? `${term}^{${exp}}` : term;
          });
        } else {
          // Standard form logic (Keep your original coefficient expansion here)
          let coeffs = [1];
          currentRoots.forEach((r) => {
            let next = new Array(coeffs.length + 1).fill(0);
            for (let i = 0; i < coeffs.length; i++) {
              next[i] += coeffs[i];
              next[i + 1] -= coeffs[i] * r;
            }
            coeffs = next;
          });
          coeffs.forEach((c, i) => {
            let p = coeffs.length - 1 - i;
            if (c === 0) return;
            let sign = c > 0 ? (i === 0 ? "" : " + ") : " - ";
            let val = Math.abs(c) === 1 && p > 0 ? "" : Math.abs(c);
            let x = p > 1 ? `x^${p}` : p === 1 ? "x" : "";
            s += `${sign}${val}${x}`;
          });
        }
        currentEq = s;
        katex.render(s, document.getElementById("eq-display"));
      }

      function drawChart() {
        const pts = [];
        for (let x = -10; x <= 10; x += 0.1) {
          let y = currentRoots.reduce((a, r) => a * (x - r), 1) * 0.1;
          pts.push({ x, y });
        }
        if (chart) chart.destroy();
        chart = new Chart(document.getElementById("factoryChart"), {
          type: "scatter",
          data: {
            datasets: [
              {
                data: pts,
                showLine: true,
                borderColor: "#e67e22",
                pointRadius: 0,
              },
            ],
          },
          options: {
            maintainAspectRatio: false,
            scales: {
              x: { position: "center", min: -10, max: 10 },
              y: { position: "center", min: -5, max: 5 },
            },
            plugins: { legend: { display: false } },
          },
        });
      }

      function checkLab() {
        const rIn = document.getElementById("ans-root"),
          eIn = document.getElementById("ans-extr");
        if (currentRoots.includes(parseFloat(rIn.value))) {
          rIn.disabled = true;
          labLocks.root = true;
          document.getElementById("res-root").innerText = "✓";
        }
        if (parseInt(eIn.value) === Math.max(0, currentDegree - 1)) {
          eIn.disabled = true;
          labLocks.extrema = true;
          document.getElementById("res-extr").innerText = "✓";
        }
        if (labLocks.root && labLocks.extrema) {
          mastery[currentDegree] = true;
          reportData[currentDegree] = {
            eq: currentEq,
            r: rIn.value,
            e: eIn.value,
          };
          document.getElementById("check-" + currentDegree).style.display =
            "inline";
        }
      }

      function showReport() {
        const zh = document.getElementById("lang-toggle").checked;
        // Renamed to Project Summary Report[cite: 1]
        let h = `<h3>${zh ? "项目总结报告" : "Project Summary Report"}</h3>`;
        h += `<table border="1" style="width:100%; border-collapse:collapse; text-align:center;">
                  <tr style="background:#2c3e50; color:white;">
                  <th>${zh ? "阶数" : "Degree"}</th>
                  <th>${zh ? "方程" : "Equation"}</th>
                  <th>${zh ? "已完成" : "Status"}</th>
                  </tr>`;

        for (let i = 1; i <= 5; i++) {
          const status = mastery[i] ? "✅" : "❌";
          const eqText = reportData[i] ? reportData[i].eq : "---";
          h += `<tr><td>${i}</td><td>${eqText}</td><td>${status}</td></tr>`;
        }
        h += `</table>`;

        // Styled action buttons: Center-aligned[cite: 1]
        h += `<div class="report-controls">
                    <button class="report-btn-style download-btn" onclick="downloadReport()">${zh ? "下载" : "Download"}</button>
                    <button class="report-btn-style close-btn" onclick="document.getElementById('report-modal').style.display='none'">${zh ? "关闭" : "Close"}</button>
                  </div>`;

        document.getElementById("report-body").innerHTML = h;
        document.getElementById("report-modal").style.display = "block";
      }

      function downloadReport() {
        const zh = document.getElementById("lang-toggle").checked;
        let textContent = zh ? "项目总结报告\n" : "PROJECT SUMMARY REPORT\n";
        textContent += "===========================\n\n";

        for (let i = 1; i <= 5; i++) {
          const status = mastery[i] ? "COMPLETED" : "INCOMPLETE";
          const eqText = reportData[i] ? reportData[i].eq : "N/A";
          textContent += `Degree ${i}: ${status}\n`;
          textContent += `Equation: ${eqText}\n`;
          if (reportData[i]) {
            textContent += `Identified Root: x = ${reportData[i].r}\n`;
            textContent += `Extrema Found: ${reportData[i].e}\n`;
          }
          textContent += "---------------------------\n";
        }

        const blob = new Blob([textContent], { type: "text/plain" });
        const url = window.URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = "Polynomial_Project_Report.txt";
        a.click();
        window.URL.revokeObjectURL(url);
      }

      createCalibrations("nums-deg");
      createCalibrations("nums-roots");
      updateUI();
    </script>
  </body>
</html>
